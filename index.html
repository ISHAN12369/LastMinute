    // AI PLANNER VIEW (Chat)
    // ===================================================================
    function AIPlannerView() {
      const {
        chatHistory, addChatMessage, clearChat, tasks, profile, apiKey, groqApiKey,
        aiProvider, aiLoading, setAiLoading, showToast, onboarded, setOnboarded
      } = useStore();
      const [input, setInput] = useState('');
      const [loading, setLoading] = useState(false);
      const chatEndRef = useRef(null);
      const inputRef = useRef(null);

      useEffect(() => {
        chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [chatHistory]);

      // First-run onboarding
      useEffect(() => {
        if (!onboarded && chatHistory.length === 0) {
          addChatMessage({
            role: 'assistant',
            content: "Hi, I'm LastMinute — your AI deadline co-pilot. 🚀\n\nWhat's the most important thing you need to get done today? Just tell me in plain language and I'll create a structured task for you.\n\nFor example: \"I need to finish my presentation by tomorrow at 5pm, it'll take about 2 hours\""
          });
        }
      }, []);

      const sendMessage = useCallback(async (text) => {
        const msg = text || input;
        if (!msg.trim()) return;
        setInput('');

        addChatMessage({ role: 'user', content: msg.trim() });

        const hasKey = aiProvider === 'groq' ? !!groqApiKey : !!apiKey;
        if (!hasKey) {
          addChatMessage({ role: 'assistant', content: "I'd love to help, but I need an API key first! Open Settings (gear icon) and select your preferred AI provider to get started." });
          return;
        }

        setLoading(true);

        const systemPrompt = `You are LastMinute, an AI productivity co-pilot. You help users manage tasks, plan their day, and meet deadlines.

Current user profile: ${JSON.stringify({ name: profile.name, workingHours: profile.workingHours, productivityPeak: profile.productivityPeak })}
Current time: ${new Date().toISOString()}
Current tasks: ${JSON.stringify(tasks.map(t => ({ id: t.id, title: t.title, deadline: t.deadline, status: t.status, priority: t.priority, estimatedMinutes: t.estimatedMinutes })))}

You can execute actions by including <action> tags in your response. Supported actions:
- <action>{"type": "create_task", "payload": {"title": "...", "deadline": "ISO string", "estimatedMinutes": 30, "priority": "medium", "description": "..."}}</action>
- <action>{"type": "update_task", "payload": {"id": "task_id", "title": "...", ...}}</action>
- <action>{"type": "delete_task", "payload": {"id": "task_id"}}</action>
- <action>{"type": "mark_complete", "payload": {"id": "task_id"}}</action>
- <action>{"type": "reschedule_task", "payload": {"id": "task_id", "deadline": "ISO string"}}</action>

Always include a friendly explanation along with any actions. Be concise and helpful. Parse natural language dates like "tomorrow 5pm" into ISO strings. Parse durations like "about 2 hours" into minutes.`;

        const messages = [...chatHistory, { role: 'user', content: sanitizeForPrompt(msg) }]
          .filter(m => m.role === 'user' || m.role === 'assistant')
          .map(m => ({ role: m.role, content: m.content }));

        try {
          const result = await callAIService(messages, systemPrompt);
          if (result) {
            const { actions, displayText } = parseActionTags(result);

            // Execute actions
            actions.forEach(action => {
              try {
                switch (action.type) {
                  case 'create_task':
                    useStore.getState().addTask(action.payload);
                    showToast(`Task created: "${action.payload.title}"`, 'success');
                    if (!onboarded) setOnboarded(true);
                    break;
                  case 'update_task':
                    if (action.payload.id) {
                      useStore.getState().updateTask(action.payload.id, action.payload);
                      showToast('Task updated', 'success');
                    }
                    break;
                  case 'delete_task':
                    if (action.payload.id) {
                      useStore.getState().deleteTask(action.payload.id);
                      showToast('Task deleted', 'info');
                    }
                    break;
                  case 'mark_complete':
                    if (action.payload.id) {
                      useStore.getState().completeTask(action.payload.id);
                      showToast('Task completed! 🎉', 'success');
                    }
                    break;
                  case 'reschedule_task':
                    if (action.payload.id) {
                      useStore.getState().updateTask(action.payload.id, { deadline: action.payload.deadline });
                      showToast('Task rescheduled', 'success');
                    }
                    break;
                }
              } catch { }
            });

            if (actions.length > 0) debouncedAIPrioritization();
            addChatMessage({ role: 'assistant', content: displayText || result });
            VoiceService.speak(displayText || result);
          } else {
            addChatMessage({ role: 'assistant', content: "I couldn't process that right now. Please try again or check your API key in Settings." });
          }
        } catch {
          addChatMessage({ role: 'assistant', content: "Something went wrong. Please try again." });
        }
        setLoading(false);
      }, [input, chatHistory, apiKey, groqApiKey, aiProvider, tasks, profile]);

      const handleVoiceResult = useCallback((text) => {
        setInput(text);
        sendMessage(text);
      }, [sendMessage]);

      const handleKeyDown = (ev) => {
        if (ev.key === 'Enter' && !ev.shiftKey) {
          ev.preventDefault();
          sendMessage();
        }
      };

      return html`<div className="planner-view view-enter h-full flex flex-col">
    <div className="flex items-center justify-between mb-4">
      <h1 className="font-heading text-2xl font-bold flex items-center gap-2">
        <span>🤖</span> AI Planner
      </h1>
      <button onClick=${clearChat} className="voldog-btn-secondary px-3 py-1.5 rounded-lg text-xs font-bold" aria-label="Clear chat">
        <span>Clear Chat</span>
      </button>
    </div>

    <div className="flex-1 overflow-y-auto space-y-3 mb-4 pr-1">
      ${chatHistory.map(msg => html`<div key=${msg.id} className=${`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
        <div className=${`max-w-[80%] px-4 py-3 ${msg.role === 'user' ? 'chat-user' : 'chat-ai'}`}>
          <p className="text-sm whitespace-pre-wrap">${msg.content}</p>
          <span className="text-[10px] opacity-75 mt-1 block font-mono">${formatTime(msg.timestamp)}</span>
        </div>
      </div>`)}
      ${loading ? html`<div className="flex justify-start"><div className="chat-ai px-4 py-3 max-w-[80%]"><${ShimmerLoader} lines=${2} /></div></div>` : null}
      <div ref=${chatEndRef} />
    </div>

    <div className="flex items-center gap-2 bg-lm-card border border-lm-border rounded-xl p-2 focus-mode-glow">
      <${VoiceButton} onResult=${handleVoiceResult} />
      <input ref=${inputRef} type="text" value=${input} onChange=${ev => setInput(ev.target.value)}
        onKeyDown=${handleKeyDown} placeholder="Ask me anything about your tasks..."
        className="flex-1 bg-transparent border-0 outline-none text-sm px-2 text-lm-text" aria-label="Chat input" />
      <button onClick=${() => sendMessage()} disabled=${loading || !input.trim()}
        className="voldog-btn px-4 py-2 rounded-xl text-sm disabled:opacity-40"
        aria-label="Send message">
        <span>Send</span>
      </button>
    </div>
  </div>`;
    }

    // ===================================================================
    // CALENDAR VIEW
    // ===================================================================
    function CalendarView() {
      const { tasks, schedule, calendarView, setCalendarView, showToast, apiKey, groqApiKey, aiProvider } = useStore();
      const [currentDate, setCurrentDate] = useState(new Date());
      const [autoScheduling, setAutoScheduling] = useState(false);

      const daysOfWeek = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

      // Get week start (Sunday)
      const getWeekStart = (date) => {
        const d = new Date(date);
        d.setDate(d.getDate() - d.getDay());
        d.setHours(0, 0, 0, 0);
        return d;
      };

      const weekStart = getWeekStart(currentDate);
      const weekDays = Array.from({ length: 7 }, (_, i) => {
        const d = new Date(weekStart);
        d.setDate(d.getDate() + i);
        return d;
      });

      // Month calendar
      const getMonthDays = (date) => {
        const year = date.getFullYear();
        const month = date.getMonth();
        const firstDay = new Date(year, month, 1);
        const lastDay = new Date(year, month + 1, 0);
        const days = [];
        // Pad with previous month's days
        for (let i = 0; i < firstDay.getDay(); i++) {
          const d = new Date(year, month, -i);
          days.unshift({ date: d, isCurrentMonth: false });
        }
        for (let i = 1; i <= lastDay.getDate(); i++) {
          days.push({ date: new Date(year, month, i), isCurrentMonth: true });
        }
        // Pad to fill 6 rows
        while (days.length < 42) {
          const d = new Date(year, month + 1, days.length - lastDay.getDate() - firstDay.getDay() + 1);
          days.push({ date: d, isCurrentMonth: false });
        }
        return days;
      };

      const monthDays = getMonthDays(currentDate);

      const getTasksForDate = (date) => {
        const dateStr = date.toDateString();
        return tasks.filter(t => {
          if (t.deadline && new Date(t.deadline).toDateString() === dateStr) return true;
          // Check schedule
          const sched = schedule.find(s => s.taskId === t.id);
          if (sched && new Date(sched.startTime).toDateString() === dateStr) return true;
          return false;
        });
      };

      const getScheduleForDate = (date) => {
        const dateStr = date.toDateString();
        return schedule.filter(s => new Date(s.startTime).toDateString() === dateStr).map(s => {
          const task = tasks.find(t => t.id === s.taskId);
          return { ...s, task };
        }).filter(s => s.task);
      };

      const handleAutoSchedule = async () => {
        const hasKey = aiProvider === 'groq' ? !!groqApiKey : !!apiKey;
        if (!hasKey) {
          showToast('Set API key in Settings first', 'warning');
          return;
        }
        setAutoScheduling(true);
        try {
          const { profile } = useStore.getState();
          const activeTasks = tasks.filter(t => t.status !== 'completed');
          const systemPrompt = `You are a scheduling AI. Given the user's working hours and tasks, create an optimal schedule for today.
      
User working hours: ${profile.workingHours.start} to ${profile.workingHours.end}
Current time: ${new Date().toISOString()}
Tasks: ${JSON.stringify(activeTasks.map(t => ({ id: t.id, title: t.title, deadline: t.deadline, estimatedMinutes: t.estimatedMinutes, priority: t.priority })))}

Return ONLY valid JSON:
{"schedule": [{"taskId": "id", "startTime": "ISO", "endTime": "ISO"}]}

Fill today's remaining working hours optimally. Prioritize by urgency.`;

          const result = await callAIService(
            [{ role: 'user', content: 'Auto-schedule my tasks for today.' }],
            systemPrompt,
            true
          );
          if (result) {
            const parsed = parseAIResponse(result);
            if (parsed?.schedule) {
              useStore.getState().setSchedule(parsed.schedule);
              showToast('Schedule updated!', 'success');
            }
          }
        } catch { }
        setAutoScheduling(false);
      };

      const navigateDate = (dir) => {
        const d = new Date(currentDate);
        if (calendarView === 'week') d.setDate(d.getDate() + dir * 7);
        else d.setMonth(d.getMonth() + dir);
        setCurrentDate(d);
      };

      const hours = Array.from({ length: 12 }, (_, i) => i + 7); // 7am - 6pm

      const isToday = (date) => date.toDateString() === new Date().toDateString();

      return html`<div className="calendar-view view-enter h-full flex flex-col">
    <div className="flex items-center justify-between mb-4">
      <h1 className="font-heading text-2xl font-bold flex items-center gap-2">
        <span>📅</span> Calendar
      </h1>
      <div className="flex items-center gap-2">
        <div className="flex bg-lm-card border border-lm-border rounded-lg overflow-hidden">
          <button onClick=${() => setCalendarView('week')}
            className=${`px-3 py-1.5 text-xs transition-colors rounded-l-lg ${calendarView === 'week' ? 'bg-lm-primary text-lm-bg font-semibold' : 'text-lm-muted hover:text-lm-primary hover:bg-lm-bg'}`}
            aria-label="Week view">Week</button>
          <button onClick=${() => setCalendarView('month')}
            className=${`px-3 py-1.5 text-xs transition-colors rounded-r-lg ${calendarView === 'month' ? 'bg-lm-primary text-lm-bg font-semibold' : 'text-lm-muted hover:text-lm-primary hover:bg-lm-bg'}`}
            aria-label="Month view">Month</button>
        </div>
        <button onClick=${handleAutoSchedule} disabled=${autoScheduling}
          className="voldog-btn flex items-center gap-1 px-4 py-2 rounded-xl text-sm disabled:opacity-40"
          aria-label="Auto schedule">
          ${autoScheduling ? '⏳' : '✨'} Auto-Schedule
        </button>
      </div>
    </div>


    <div className="flex items-center justify-between mb-4">
      <button onClick=${() => navigateDate(-1)} className="p-2 rounded-lg bg-lm-card border border-lm-border hover:border-lm-primary hover:bg-lm-cardHover transition-colors" aria-label="Previous">◀</button>
      <h2 className="font-heading font-semibold">
        ${calendarView === 'week'
          ? `${weekDays[0].toLocaleDateString('en-US', { month: 'short', day: 'numeric' })} — ${weekDays[6].toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}`
          : currentDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' })}
      </h2>
      <button onClick=${() => navigateDate(1)} className="p-2 rounded-lg bg-lm-card border border-lm-border hover:border-lm-primary hover:bg-lm-cardHover transition-colors" aria-label="Next">▶</button>
    </div>


    ${calendarView === 'week' ? html`
      <div className="flex-1 overflow-auto">
        <div className="grid grid-cols-8 min-w-[700px]">

          <div className="bg-lm-surface border-b border-lm-border p-2" />
          ${weekDays.map(d => html`<div key=${d.toISOString()}
            className=${`bg-lm-surface border-b border-l border-lm-border p-2 text-center ${isToday(d) ? 'bg-lm-primaryLight/20' : ''}`}>
            <p className="text-xs text-lm-muted">${daysOfWeek[d.getDay()]}</p>
            <p className=${`text-sm font-semibold ${isToday(d) ? 'text-lm-primary' : ''}`}>${d.getDate()}</p>
          </div>`)}


          ${hours.map(h => html`<${Fragment} key=${h}>
            <div className="border-b border-lm-border px-2 py-3 text-xs text-lm-muted font-mono text-right">
              ${h > 12 ? h - 12 : h}${h >= 12 ? 'pm' : 'am'}
            </div>
            ${weekDays.map(d => {
            const daySchedule = getScheduleForDate(d);
            const slotTasks = daySchedule.filter(s => {
              const startHour = new Date(s.startTime).getHours();
              return startHour === h;
            });
            return html`<div key=${d.toISOString() + h} className="border-b border-l border-lm-border p-1 min-h-[48px] relative">
                ${slotTasks.map(s => html`<div key=${s.taskId}
                  className="rounded-md px-2 py-1 text-xs truncate mb-0.5"
                  style=${{ background: PRIORITY_COLORS[s.task?.priority] + '30', borderLeft: `3px solid ${PRIORITY_COLORS[s.task?.priority]}` }}>
                  ${s.task?.title}
                </div>`)}
              </div>`;
          })}
          </${Fragment}>`)}
        </div>
      </div>
    ` : html`
      <div className="flex-1">

        <div className="grid grid-cols-7 gap-px mb-1">
          ${daysOfWeek.map(d => html`<div key=${d} className="text-center text-xs text-lm-muted py-2">${d}</div>`)}
        </div>

        <div className="grid grid-cols-7 gap-px">
          ${monthDays.map(({ date, isCurrentMonth }) => {
            const dayTasks = getTasksForDate(date);
            return html`<div key=${date.toISOString()}
              className=${`min-h-[80px] p-1.5 rounded-lg border border-lm-border ${isCurrentMonth ? 'bg-lm-card' : 'bg-lm-surface opacity-40'} ${isToday(date) ? 'ring-1 ring-lm-primary' : ''}`}>
              <p className=${`text-xs font-mono mb-1 ${isToday(date) ? 'text-lm-primary font-bold' : 'text-lm-muted'}`}>${date.getDate()}</p>
              ${dayTasks.slice(0, 3).map(t => html`<div key=${t.id} className="rounded px-1 py-0.5 text-xs truncate mb-0.5"
                style=${{ background: PRIORITY_COLORS[t.priority] + '30', color: PRIORITY_COLORS[t.priority] }}>
                ${t.title}
              </div>`)}
              ${dayTasks.length > 3 ? html`<p className="text-xs text-lm-muted">+${dayTasks.length - 3} more</p>` : null}
            </div>`;
          })}
        </div>
      </div>
    `}
  </div>`;
    }

    // ===================================================================
    // ANALYTICS VIEW
    // ===================================================================
    function AnalyticsView() {
      const { tasks, profile } = useStore();

      // Weekly completion data (last 7 days)
      const weeklyData = useMemo(() => {
        const days = [];
        const now = new Date();
        for (let i = 6; i >= 0; i--) {
          const d = new Date(now);
          d.setDate(d.getDate() - i);
          const dateStr = d.toDateString();
          const completed = tasks.filter(t => t.completedAt && new Date(t.completedAt).toDateString() === dateStr).length;
          days.push({ label: d.toLocaleDateString('en-US', { weekday: 'short' }), count: completed, date: d });
        }
        return days;
      }, [tasks]);

      const maxWeekly = Math.max(...weeklyData.map(d => d.count), 1);

      // 90-day heatmap
      const heatmapData = useMemo(() => {
        const days = [];
        const now = new Date();
        for (let i = 89; i >= 0; i--) {
          const d = new Date(now);
          d.setDate(d.getDate() - i);
          const dateStr = d.toDateString();
          const completed = tasks.filter(t => t.completedAt && new Date(t.completedAt).toDateString() === dateStr).length;
          days.push({ date: d, count: completed });
        }
        return days;
      }, [tasks]);

      const maxHeatmap = Math.max(...heatmapData.map(d => d.count), 1);

      const getHeatmapColor = (count) => {
        if (count === 0) return '#E6E5DC';
        const intensity = count / maxHeatmap;
        if (intensity < 0.25) return '#C2CECB';
        if (intensity < 0.5) return '#8DA39E';
        if (intensity < 0.75) return '#56746E';
        return '#1E3A34';
      };

      // Badges
      const badges = useMemo(() => {
        const earned = [];
        if (profile.streakDays >= 7) earned.push({ icon: '🔥', label: '7-Day Streak', desc: 'Completed tasks 7 days in a row' });
        if (profile.streakDays >= 30) earned.push({ icon: '💎', label: '30-Day Streak', desc: 'A whole month of consistency!' });

        const thisWeekCompleted = weeklyData.reduce((sum, d) => sum + d.count, 0);
        if (thisWeekCompleted >= 10) earned.push({ icon: '🏆', label: '10 This Week', desc: 'Completed 10 tasks this week' });

        const now = new Date();
        const thisMonth = tasks.filter(t => {
          if (t.status !== 'overdue') return false;
          const dl = new Date(t.deadline);
          return dl.getMonth() === now.getMonth() && dl.getFullYear() === now.getFullYear();
        });
        if (thisMonth.length === 0) earned.push({ icon: '🛡️', label: 'Zero Missed', desc: 'No missed deadlines this month' });

        if (profile.totalCompleted >= 50) earned.push({ icon: '⭐', label: '50 Club', desc: 'Completed 50 tasks total' });
        if (profile.totalCompleted >= 100) earned.push({ icon: '🌟', label: 'Century', desc: '100 tasks completed!' });

        // Always show at least one badge (getting started)
        if (earned.length === 0) earned.push({ icon: '🚀', label: 'Getting Started', desc: 'Welcome to LastMinute!' });

        return earned;
      }, [profile, tasks, weeklyData]);

      return html`<div className="view-enter h-full overflow-y-auto">
    <h1 className="font-heading text-2xl font-bold mb-6 flex items-center gap-2">
      <span>📊</span> Analytics
    </h1>


    <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
      <div className="bg-lm-card border border-lm-border rounded-xl p-4 text-center">
        <p className="text-3xl font-heading font-bold text-lm-primary">${profile.totalCompleted}</p>
        <p className="text-xs text-lm-muted mt-1">Total Completed</p>
      </div>
      <div className="bg-lm-card border border-lm-border rounded-xl p-4 text-center">
        <p className="text-3xl font-heading font-bold">🔥 ${profile.streakDays}</p>
        <p className="text-xs text-lm-muted mt-1">Day Streak</p>
      </div>
      <div className="bg-lm-card border border-lm-border rounded-xl p-4 text-center">
        <p className="text-3xl font-heading font-bold text-lm-completed">${tasks.filter(t => t.status === 'completed').length}</p>
        <p className="text-xs text-lm-muted mt-1">Done</p>
      </div>
      <div className="bg-lm-card border border-lm-border rounded-xl p-4 text-center">
        <p className="text-3xl font-heading font-bold text-lm-critical">${profile.missedDeadlines}</p>
        <p className="text-xs text-lm-muted mt-1">Missed</p>
      </div>
    </div>


    <div className="bg-lm-card border border-lm-border rounded-xl p-5 mb-6">
      <h2 className="font-heading font-semibold mb-4">Weekly Completion</h2>
      <svg viewBox="0 0 350 160" className="w-full" aria-label="Weekly completion chart">
        ${weeklyData.map((d, i) => {
        const barHeight = (d.count / maxWeekly) * 100;
        const x = i * 50 + 10;
        return html`<${Fragment} key=${i}>
            <rect x=${x} y=${130 - barHeight} width="30" height=${barHeight || 2}
              rx="4" fill=${d.count > 0 ? '#1E3A34' : '#E6E5DC'}
              style=${{ transition: 'height 500ms ease, y 500ms ease' }} />
            <text x=${x + 15} y="150" textAnchor="middle" fill="#6C8580" fontSize="10" fontFamily="Inter">${d.label}</text>
            ${d.count > 0 ? html`<text x=${x + 15} y=${125 - barHeight} textAnchor="middle" fill="#F7F5EE" fontSize="10" fontFamily="JetBrains Mono">${d.count}</text>` : null}
          </${Fragment}>`;
      })}
      </svg>
    </div>


    <div className="bg-lm-card border border-lm-border rounded-xl p-5 mb-6">
      <h2 className="font-heading font-semibold mb-4">90-Day Activity</h2>
      <div className="flex flex-wrap gap-1">
        ${heatmapData.map((d, i) => html`<div key=${i}
          className="heatmap-cell w-3 h-3 rounded-sm"
          style=${{ background: getHeatmapColor(d.count) }}
          title=${`${d.date.toLocaleDateString()}: ${d.count} tasks`}
          aria-label=${`${d.date.toLocaleDateString()}: ${d.count} tasks completed`}
        />`)}
      </div>
      <div className="flex items-center gap-2 mt-3 text-xs text-lm-muted">
        <span>Less</span>
        ${[0, 0.25, 0.5, 0.75, 1].map((v, i) => html`<div key=${i} className="w-3 h-3 rounded-sm" style=${{ background: getHeatmapColor(v * maxHeatmap) }} />`)}
        <span>More</span>
      </div>
    </div>


    <div className="bg-lm-card border border-lm-border rounded-xl p-5">
      <h2 className="font-heading font-semibold mb-4">Badges</h2>
      <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
        ${badges.map((b, i) => html`<div key=${i} className="flex items-center gap-3 p-3 bg-lm-bg rounded-xl border border-lm-border">
          <span className="text-3xl">${b.icon}</span>
          <div>
            <p className="text-sm font-semibold">${b.label}</p>
            <p className="text-xs text-lm-muted">${b.desc}</p>
          </div>
        </div>`)}
      </div>
    </div>
  </div>`;
    }

    // ===================================================================
    // MASCOT (Vector visual companion)
    // ===================================================================
    function Mascot({ mood }) {
      const isSleeping = mood === 'resting';
      const isExcited = mood === 'happy';
      const isAlert = mood === 'alert';

      return html`<svg width="180" height="180" viewBox="0 0 200 200" className="mx-auto" aria-hidden="true">
    <defs>
      <radialGradient id="mascotGlow" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stopColor=${isAlert ? 'rgba(244,63,94,0.2)' : 'rgba(60,208,112,0.2)'} />
        <stop offset="100%" stopColor="rgba(8,12,14,0)" />
      </radialGradient>
    </defs>

    // ===================================================================
    // FOCUS MODE VIEW (Minimalist deadline hero page)
    // ===================================================================
    function FocusModeView() {
      const { tasks, setFocusMode, completeTask, toggleSubtask, showToast } = useStore();
      const [happyTime, setHappyTime] = useState(false);

      const nextTask = useMemo(() => {
        return tasks
          .filter(t => t.status !== 'completed')
          .sort((a, b) => {
            const aStatus = getDeadlineStatus(a.deadline);
            const bStatus = getDeadlineStatus(b.deadline);
            if (aStatus === 'critical' && bStatus !== 'critical') return -1;
            if (bStatus === 'critical' && aStatus !== 'critical') return 1;
            return (b.aiScore || 0) - (a.aiScore || 0) || new Date(a.deadline) - new Date(b.deadline);
          })[0];
      }, [tasks]);

      const handleSubtaskChange = (taskId, subtaskId) => {
        toggleSubtask(taskId, subtaskId);
        setHappyTime(true);
        setTimeout(() => setHappyTime(false), 2000);
      };

      const handleComplete = () => {
        if (!nextTask) return;
        completeTask(nextTask.id);
        showToast(`"${nextTask.title}" completed! 🎉`, 'success');
        setHappyTime(true);
        setTimeout(() => setHappyTime(false), 2000);
      };

      const mood = useMemo(() => {
        if (!nextTask) return 'resting';
        if (happyTime) return 'happy';
        const status = getDeadlineStatus(nextTask.deadline);
        if (status === 'critical' || status === 'overdue') return 'alert';
        return 'chill';
      }, [nextTask, happyTime]);

      let radius = 70;
      let circumference = 2 * Math.PI * radius;
      let progress = 1;
      let remainingText = 'No deadlines';
      let color = '#1E3A34';

      if (nextTask) {
        const status = getDeadlineStatus(nextTask.deadline);
        const now = Date.now();
        const dl = new Date(nextTask.deadline).getTime();
        const remaining = Math.max(0, dl - now);
        progress = Math.min(1, remaining / (86400000 * 7));
        remainingText = getTimeRemaining(nextTask.deadline);

        color = status === 'critical' || status === 'overdue' ? '#E05A47'
          : status === 'high' ? '#E2943B'
            : status === 'medium' ? '#F2C94C' : '#DDE235';
      }

      const offset = circumference * (1 - progress);

      return html`<div className="view-enter flex flex-col items-center justify-center min-h-[85vh] text-center px-4 relative">
    <div className="absolute top-0 right-0 flex items-center gap-3">
      <span className="text-[10px] font-mono text-lm-muted tracking-widest">FOCUS MODE ACTIVE</span>
      <button onClick=${() => setFocusMode(false)}
        className="voldog-btn px-4 py-1.5 rounded-full text-xs font-semibold focus-mode-glow flex items-center gap-1"

      <div className="mb-4">
        <${Mascot} mood=${mood} />
      </div>

      ${nextTask ? html`
        <div className="space-y-6">
          <div>
            <span className="text-[9px] tracking-widest font-mono text-lm-primary bg-lm-primary/10 px-3 py-1 rounded-full uppercase font-bold">NEXT UP</span>
            <h2 className="text-xl font-heading font-bold mt-3 text-lm-text tracking-tight">${nextTask.title}</h2>
            ${nextTask.description ? html`<p className="text-xs text-lm-muted mt-2 max-w-md mx-auto leading-relaxed">${nextTask.description}</p>` : null}
          </div>

          <div className="relative flex items-center justify-center h-40">
            <svg width="150" height="150" className="absolute">
              <circle cx="75" cy="75" r=${radius} fill="none" stroke="#1C2529" strokeWidth="5" />
              <circle cx="75" cy="75" r=${radius} fill="none" stroke=${color} strokeWidth="5"
                strokeDasharray=${circumference} strokeDashoffset=${offset}

    // ===================================================================
    // KINETIC INTRO
    // ===================================================================
    function KineticIntro() {
      const [visible, setVisible] = useState(true);
      const rootRef = useRef(null);

      const closeIntro = useCallback(() => {
        const root = rootRef.current;
        if (root && window.gsap) {
          window.gsap.to(root, {
            clipPath: 'inset(0 0 100% 0)',
            duration: 0.65,
            ease: 'power4.inOut',
            onComplete: () => setVisible(false)
          });
        } else {
          setVisible(false);
        }
      }, []);

      useEffect(() => {
        if (!visible || !rootRef.current) return;
        const root = rootRef.current;
        const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

        if (!window.gsap || prefersReduced) {
          const timer = setTimeout(() => setVisible(false), prefersReduced ? 800 : 2600);
          return () => clearTimeout(timer);
        }

        const words = root.querySelectorAll('.intro-word');
        const polygon = root.querySelector('.kinetic-intro__polygon');
        const tl = window.gsap.timeline({ defaults: { ease: 'power4.out' } });

        window.gsap.set(words, { yPercent: 120, opacity: 0, rotate: 3 });
        words.forEach(word => {
          tl.to(word, { yPercent: 0, opacity: 1, rotate: 0, duration: 0.42 })
            .to(word, { yPercent: -120, opacity: 0, rotate: -3, duration: 0.35, ease: 'power3.in' }, '+=0.12');
        });
        tl.fromTo(polygon,
          { scale: 0.72, rotate: -8 },
          { scale: 1, rotate: 0, duration: 2.6, ease: 'expo.out' },
          0
        ).to(root, {
          clipPath: 'inset(0 0 100% 0)',
          duration: 0.75,
          ease: 'power4.inOut',
          onComplete: () => setVisible(false)
        });

        return () => tl.kill();
      }, [visible]);

      if (!visible) return null;

      return html`<div ref=${rootRef} className="kinetic-intro" aria-label="LastMinute introduction">
        <div className="kinetic-intro__brand">LM.</div>
        <button className="kinetic-intro__skip" onClick=${closeIntro} aria-label="Skip introduction">Skip intro</button>
        <div className="kinetic-intro__stage">
          <div className="kinetic-intro__polygon" />
          <div className="kinetic-intro__words" aria-hidden="true">
            <span className="intro-word">plan</span>
            <span className="intro-word">focus</span>
            <span className="intro-word">finish</span>
            <span className="intro-word">on time.</span>
          </div>
        </div>
        <div className="kinetic-intro__footer">Your deadline co-pilot.<br />Make time matter.</div>
      </div>`;
    }

    // ===================================================================
    // APP
    // ===================================================================
    function App() {
      const { apiKey, groqApiKey, aiProvider, focusMode, currentView } = useStore();
      const tasks = useStore(s => s.tasks);

      const hasKey = aiProvider === 'groq' ? !!groqApiKey : !!apiKey;

      // GSAP view reveals and pointer-reactive scene lighting
      useEffect(() => {
        const shell = document.querySelector('.app-shell');
        const view = document.querySelector('.workspace-main .view-enter');
        if (window.gsap && view && !window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
          window.gsap.fromTo(view,
            { opacity: 0, y: 34, clipPath: 'polygon(0 10%, 100% 0, 100% 100%, 0 92%)' },
            { opacity: 1, y: 0, clipPath: 'polygon(0 0, 100% 0, 100% 100%, 0 100%)', duration: 0.72, ease: 'power4.out' }
          );
        }

        const handlePointer = (event) => {
          if (!shell) return;
          shell.style.setProperty('--mx', `${event.clientX}px`);
          shell.style.setProperty('--my', `${event.clientY}px`);
        };
        window.addEventListener('pointermove', handlePointer, { passive: true });
        return () => window.removeEventListener('pointermove', handlePointer);
      }, [currentView, focusMode]);

      // VolDog Lagging Cursor Effect
      useEffect(() => {
        const isFinePointer = window.matchMedia('(pointer: fine)').matches;
        if (!isFinePointer) return;

        const dot = document.getElementById('voldog-cursor-dot');
        const ring = document.getElementById('voldog-cursor-ring');
        if (!dot || !ring) return;

        let mouseX = 0;
        let mouseY = 0;
        let ringX = 0;
        let ringY = 0;

        const onMouseMove = (e) => {
          mouseX = e.clientX;
          mouseY = e.clientY;
          dot.style.left = `${mouseX}px`;
          dot.style.top = `${mouseY}px`;
        };

        window.addEventListener('mousemove', onMouseMove);

        let active = true;
        const tick = () => {
          if (!active) return;
          ringX += (mouseX - ringX) * 0.14;
          ringY += (mouseY - ringY) * 0.14;

          ring.style.left = `${ringX}px`;
          ring.style.top = `${ringY}px`;

          requestAnimationFrame(tick);
        };
        requestAnimationFrame(tick);

        const handleMouseOver = (e) => {
          const target = e.target;
          if (!target) return;
          if (
            target.closest('a') ||
            target.closest('button') ||
            target.closest('.task-card') ||
            target.closest('input') ||
            target.closest('textarea') ||
            target.closest('select') ||
            target.closest('[draggable="true"]') ||
            target.classList.contains('cursor-pointer')
          ) {
            document.body.classList.add('voldog-cursor-hovering');
          }
        };

        const handleMouseOut = (e) => {
          const target = e.target;
          if (!target) return;
          if (
            target.closest('a') ||
            target.closest('button') ||
            target.closest('.task-card') ||
            target.closest('input') ||
            target.closest('textarea') ||
            target.closest('select') ||
            target.closest('[draggable="true"]') ||
            target.classList.contains('cursor-pointer')
          ) {
            document.body.classList.remove('voldog-cursor-hovering');
          }
        };

        window.addEventListener('mouseover', handleMouseOver);
        window.addEventListener('mouseout', handleMouseOut);

        return () => {
          active = false;
          window.removeEventListener('mousemove', onMouseMove);
          window.removeEventListener('mouseover', handleMouseOver);
          window.removeEventListener('mouseout', handleMouseOut);
          document.body.classList.remove('voldog-cursor-hovering');
        };
      }, []);

      // Run AI prioritization on load
      useEffect(() => {
        if (hasKey) {
          debouncedAIPrioritization();
        }
      }, []);

      // Proactive alert checker
      useEffect(() => {
        checkAlerts();
        const interval = setInterval(checkAlerts, ALERT_CHECK_INTERVAL_MS);
        return () => clearInterval(interval);
      }, [tasks]);

      // Subscribe to task mutations for AI re-prioritization
      useEffect(() => {
        const unsub = useStore.subscribe(
          (state, prevState) => {
            const currentHasKey = state.aiProvider === 'groq' ? !!state.groqApiKey : !!state.apiKey;
            if (state.tasks !== prevState.tasks && currentHasKey) {
              debouncedAIPrioritization();
            }
          }
        );
        return unsub;
      }, []);

      // Prompt for API key on first launch if not set
      useEffect(() => {
        if (!hasKey) {
          setTimeout(() => {
            useStore.getState().showToast('Set your API key in Settings to enable AI features', 'info');
          }, 2000);
        }
      }, []);

      return html`<div className="app-shell flex h-screen bg-lm-bg overflow-hidden relative" data-view=${currentView}>
    <${KineticIntro} />
    <div className="kinetic-shape kinetic-shape--one" aria-hidden="true" />
    <div className="kinetic-shape kinetic-shape--two" aria-hidden="true" />
    <div id="voldog-cursor-dot" className="voldog-cursor-dot" />
    <div id="voldog-cursor-ring" className="voldog-cursor-ring" />

    ${focusMode
          ? html`<div className="focus-shell flex-1 p-4 md:p-6 overflow-y-auto">
          <${FocusModeView} />
        </div>`
          : html`
          <${Sidebar} />
          <div className="flex-1 flex flex-col min-w-0">
            <${TopBar} />
            <main className="workspace-main flex-1 p-4 md:p-6 overflow-hidden">
               <${ViewRouter} />
            </main>
          </div>
        `
        }
    <${SettingsModal} />
    <${ToastContainer} />
    ${!focusMode && html`<${MobileTabBar} />`}
  </div>`;
    }

    // ===================================================================
    // TEST SUITE
    // ===================================================================
    function runTests() {
      const results = [];
      let passed = 0;
      let failed = 0;

      function assert(name, condition) {
        if (condition) {
          results.push({ name, pass: true });
          passed++;
        } else {
          results.push({ name, pass: false });
          failed++;
        }
      }

      // -- sanitizeForPrompt tests --
      assert('sanitize: strips < and >', sanitizeForPrompt('hello ' + String.fromCharCode(60) + 'script' + String.fromCharCode(62) + 'alert("xss")' + String.fromCharCode(60) + '/script' + String.fromCharCode(62)) === 'hello scriptalert("xss")/script');
      assert('sanitize: collapses newlines', sanitizeForPrompt('a\n\n\n\n\nb').includes('\n\n') && !sanitizeForPrompt('a\n\n\n\n\nb').includes('\n\n\n'));
      assert('sanitize: caps at 500 chars', sanitizeForPrompt('x'.repeat(600)).length === 500);
      assert('sanitize: handles empty string', sanitizeForPrompt('') === '');
      assert('sanitize: handles null', sanitizeForPrompt(null) === '');
      assert('sanitize: handles number', sanitizeForPrompt(42) === '');
      assert('sanitize: trims whitespace', sanitizeForPrompt('  hello  ') === 'hello');
      assert('sanitize: strips carriage returns', sanitizeForPrompt('a\r\nb') === 'a\nb');

      // -- Task CRUD tests --
      const store = useStore.getState();
      const initialCount = store.tasks.length;
      const newTask = store.addTask({ title: 'Test Task', deadline: new Date(Date.now() + 3600000).toISOString(), estimatedMinutes: 30 });
      assert('CRUD: addTask increases count', useStore.getState().tasks.length === initialCount + 1);
      assert('CRUD: addTask returns task with id', !!newTask.id);

      store.updateTask(newTask.id, { title: 'Updated Test' });
      const updated = useStore.getState().tasks.find(t => t.id === newTask.id);
      assert('CRUD: updateTask changes title', updated?.title === 'Updated Test');

      store.deleteTask(newTask.id);
      assert('CRUD: deleteTask removes task', useStore.getState().tasks.length === initialCount);

      // -- parseAIResponse tests --
      assert('parseAI: valid JSON', parseAIResponse('{"rankedTaskIds":["a"]}')?.rankedTaskIds?.[0] === 'a');
      assert('parseAI: with markdown fences', parseAIResponse('```json\n{"ok":true}\n```')?.ok === true);
      assert('parseAI: malformed returns null', parseAIResponse('not json at all') === null);
      assert('parseAI: empty string returns null', parseAIResponse('') === null);
      assert('parseAI: null input returns null', parseAIResponse(null) === null);
      assert('parseAI: extracts embedded JSON', parseAIResponse('here is data {"val":1} end')?.val === 1);

      // -- deadlineStatus tests --
      assert('deadline: overdue', getDeadlineStatus(new Date(Date.now() - 1000).toISOString()) === 'overdue');
      assert('deadline: critical (30 min)', getDeadlineStatus(new Date(Date.now() + 30 * 60000).toISOString()) === 'critical');
      assert('deadline: high (2 hours)', getDeadlineStatus(new Date(Date.now() + 2 * 3600000).toISOString()) === 'high');
      assert('deadline: medium (12 hours)', getDeadlineStatus(new Date(Date.now() + 12 * 3600000).toISOString()) === 'medium');
      assert('deadline: safe (2 days)', getDeadlineStatus(new Date(Date.now() + 48 * 3600000).toISOString()) === 'safe');

      // -- Rate limiter tests --
      rateLimiter.reset();
      assert('rate: under limit allows', rateLimiter.canCall() === true);
      for (let i = 0; i < 10; i++) rateLimiter.record();
      assert('rate: at limit blocks', rateLimiter.canCall() === false);
      rateLimiter.reset();
      for (let i = 0; i < 9; i++) rateLimiter.record();
      assert('rate: just under limit allows', rateLimiter.canCall() === true);
      rateLimiter.reset();

      // -- Recurrence tests --
      const recTask = { deadline: '2025-06-26T10:00:00Z', recurrence: 'daily', completedAt: '2025-06-26T10:00:00Z' };
      const nextDate = getNextRecurrenceDate(recTask);
      assert('recurrence: daily adds 1 day', nextDate && new Date(nextDate).getDate() === 27);

      const weeklyTask = { deadline: '2025-06-26T10:00:00Z', recurrence: 'weekly', completedAt: '2025-06-26T10:00:00Z' };
      const nextWeekly = getNextRecurrenceDate(weeklyTask);
      assert('recurrence: weekly adds 7 days', nextWeekly && new Date(nextWeekly).getDate() === 3);

      const monthlyTask = { deadline: '2025-06-26T10:00:00Z', recurrence: 'monthly', completedAt: '2025-06-26T10:00:00Z' };
      const nextMonthly = getNextRecurrenceDate(monthlyTask);
      assert('recurrence: monthly adds 1 month', nextMonthly && new Date(nextMonthly).getMonth() === 6);

      const noRecur = { deadline: '2025-06-26T10:00:00Z', recurrence: 'none', completedAt: null };
      assert('recurrence: none returns null', getNextRecurrenceDate(noRecur) === null);

      // -- Validation tests --
      assert('validate: empty title fails', validateTitle('') !== null);
      assert('validate: valid title passes', validateTitle('Hello') === null);
      assert('validate: long title fails', validateTitle('x'.repeat(201)) !== null);
      assert('validate: bad deadline fails', validateDeadline('notadate') !== null);
      assert('validate: valid deadline passes', validateDeadline(new Date().toISOString()) === null);
      assert('validate: 0 minutes fails', validateEstimatedMinutes(0) !== null);
      assert('validate: 481 minutes fails', validateEstimatedMinutes(481) !== null);

      return { results, passed, failed };
    }

    // -- Test Overlay --
    function TestOverlay() {
      const [testResults, setTestResults] = useState(null);

      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        if (params.get('test') === 'true') {
          setTimeout(() => {
            const results = runTests();
            setTestResults(results);
          }, 500);
        }
      }, []);

      if (!testResults) return null;

      return html`<div className="test-overlay">
    <div className="max-w-2xl mx-auto">
      <h1 className="text-2xl font-heading font-bold mb-2">LastMinute Test Suite</h1>
      <p className="mb-4 text-lm-muted">
        <span className="text-lm-completed font-bold">${testResults.passed} passed</span>
        ${' / '}
        <span className=${testResults.failed > 0 ? 'text-lm-critical font-bold' : 'text-lm-muted'}>${testResults.failed} failed</span>
        ${' / '}
        <span>${testResults.results.length} total</span>
      </p>

      <div className="space-y-1">
        ${testResults.results.map((r, i) => html`<div key=${i}
          className=${`flex items-center gap-2 px-3 py-2 rounded-lg text-sm ${r.pass ? 'bg-emerald-900/20' : 'bg-red-900/20'}`}>
          <span className=${r.pass ? 'text-lm-completed' : 'text-lm-critical'}>${r.pass ? '✓' : '✗'}</span>
          <span>${r.name}</span>
        </div>`)}
      </div>

      <button onClick=${() => window.location.href = window.location.pathname}
        className="mt-6 px-4 py-2 bg-lm-primary rounded-lg text-sm hover:opacity-90 transition-opacity"
        aria-label="Close tests">
        Close Tests
      </button>
    </div>
  </div>`;
    }

    // ===================================================================
    // MOUNT
    // ===================================================================
    function Root() {
      return html`<${ErrorBoundary}>
    <${App} />
    <${TestOverlay} />
  </${ErrorBoundary}>`;
    }

    const rootEl = document.getElementById('root');
    const root = createRoot(rootEl);
    root.render(html`<${Root} />`);

  </script>
</body>

</html>
