<!--
+==============================================================================+
|  LastMinute — AI-Powered Deadline Co-Pilot                                  |
|  Version: 1.0.0                                                             |
|  Architecture: Single-file SPA (React 18 + Zustand + Tailwind CSS)          |
+==============================================================================+
|                                                                              |
|  ARCHITECTURE                                                                |
|  ------------                                                                |
|  • React 18 via esm.sh CDN (no build step)                                  |
|  • htm for JSX-like template literals                                        |
|  • Zustand for global state management                                       |
|  • Tailwind CSS CDN for utility-first styling                                |
|  • Custom CSS for animations, dark theme, and specialty components           |
|  • SVG for charts, heatmaps, and urgency pulse rings                         |
|  • CSS Grid for calendar views                                               |
|  • HTML5 Drag & Drop API for Kanban board                                    |
|  • Web Speech API for voice input/output                                     |
|  • Anthropic Claude API (claude-sonnet-4-6) for AI features              |
|                                                                              |
|  DATA FLOW                                                                   |
|  ---------                                                                   |
|  localStorage <> Zustand Store <> React Components                          |
|                       |                                                      |
|               Claude API (debounced)                                         |
|                       |                                                      |
|              AI Insights / Schedule                                          |
|                                                                              |
|  SECURITY MODEL                                                              |
|  --------------                                                              |
|  1. API key stored in localStorage as 'lm_api_key', never logged             |
|  2. Key displayed masked: ••••••••XXXX (last 4 chars only)                   |
|  3. All user input sanitized before prompt injection                          |
|  4. No innerHTML/dangerouslySetInnerHTML — text nodes only                   |
|  5. Client-side rate limiter: max 10 API calls per 60 seconds                |
|  6. Error boundaries wrap every major section                                |
|  7. Input validation on all form fields                                      |
|                                                                              |
|  API KEY SETUP                                                               |
|  -------------                                                               |
|  1. Open the app                                                             |
|  2. Click the gear icon in the sidebar or the prompt on first launch         |
|  3. Paste your Anthropic API key                                             |
|  4. Key is stored locally — never sent anywhere except Anthropic's API       |
|                                                                              |
|  RUNNING TESTS                                                               |
|  -------------                                                               |
|  Append ?test=true to the URL to run the in-browser test suite.              |
|  Results appear in a visible overlay panel with pass/fail indicators.        |
|                                                                              |
+==============================================================================+
-->
<!DOCTYPE html>
<html lang="en" class="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="LastMinute — AI-powered deadline co-pilot that helps you plan and complete tasks before you miss deadlines." />
  <title>LastMinute — AI Deadline Co-Pilot</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@400;500&family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet" />

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            lm: {
              bg: '#090B0A',
              card: '#151815',
              cardHover: '#1B201C',
              primary: '#DFFF62',
              primaryLight: '#B9FF4F',
              completed: '#8EF0A7',
              critical: '#FF7163',
              warning: '#FFB35C',
              caution: '#F4D35E',
              text: '#F4F2E9',
              muted: '#8E988F',
              border: '#2A302B',
              surface: '#101311',
            }
          },
          fontFamily: {
            heading: ['Archivo', 'sans-serif'],
            body: ['Inter', 'sans-serif'],
            mono: ['DM Mono', 'monospace'],
          }
        }
      }
    };
  </script>

  <style>
    /* ========== BASE ========== */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #090B0A;
      color: #F4F2E9;
      overflow-x: hidden;
      min-height: 100vh;
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      font-family: 'Archivo', sans-serif;
      letter-spacing: -0.02em;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #F7F5EE;
    }

    ::-webkit-scrollbar-thumb {
      background: #E6E5DC;
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #1E3A34;
    }

    /* ========== FOCUS ========== */
    *:focus-visible {
      outline: 2px solid #1E3A34;
      outline-offset: 2px;
      border-radius: 4px;
    }

    /* ========== VIEW TRANSITIONS ========== */
    .view-enter {
      animation: viewIn 300ms ease forwards;
    }

    .view-exit {
      animation: viewOut 200ms ease forwards;
    }

    @keyframes viewIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes viewOut {
      from {
        opacity: 1;
        transform: translateY(0);
      }

      to {
        opacity: 0;
        transform: translateY(-12px);
      }
    }

    /* ========== CUSTOM CURSOR ========== */
    .voldog-cursor-dot {
      width: 6px;
      height: 6px;
      background-color: #1E3A34;
      border-radius: 50%;
      position: fixed;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 10000;
      transition: width 0.2s ease, height 0.2s ease, background-color 0.2s ease;
    }

    .voldog-cursor-ring {
      width: 32px;
      height: 32px;
      border: 1.5px solid rgba(30, 58, 52, 0.3);
      border-radius: 50%;
      position: fixed;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 9999;
      transition: width 0.3s cubic-bezier(0.1, 0.8, 0.3, 1), height 0.3s cubic-bezier(0.1, 0.8, 0.3, 1), border-color 0.3s ease, background-color 0.3s ease;
    }

    .voldog-cursor-hovering .voldog-cursor-ring {
      width: 52px;
      height: 52px;
      border-color: rgba(30, 58, 52, 0.9);
      background-color: rgba(221, 226, 53, 0.2);
    }

    .voldog-cursor-hovering .voldog-cursor-dot {
      background-color: #1E3A34;
      width: 8px;
      height: 8px;
    }

    @media (pointer: fine) {

      body,
      button,
      a,
      select,
      input,
      textarea,
      [draggable="true"] {
        cursor: none !important;
      }
    }

    @media (pointer: coarse),
    (hover: none) {

      .voldog-cursor-dot,
      .voldog-cursor-ring {
        display: none !important;
      }
    }

    /* ========== VOLDOG CUSTOM INTERACTIONS ========== */
    .voldog-btn {
      position: relative;
      overflow: hidden;
      transition: color 0.35s cubic-bezier(0.19, 1, 0.22, 1), border-color 0.35s ease, background-color 0.35s ease;
      border: 1.5px solid #1E3A34;
      background: #DDE235;
      color: #1E3A34;
      font-weight: 600;
      border-radius: 9999px;
    }

    .voldog-btn::after {
      content: '';
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 0;
      background-color: #1E3A34;
      z-index: 0;
      transition: height 0.35s cubic-bezier(0.19, 1, 0.22, 1);
    }

    .voldog-btn:hover {
      color: #F7F5EE !important;
      border-color: #1E3A34;
    }

    .voldog-btn:hover::after {
      height: 100%;
    }

    .voldog-btn>* {
      position: relative;
      z-index: 1;
    }

    .voldog-btn-secondary {
      position: relative;
      overflow: hidden;
      transition: color 0.35s cubic-bezier(0.19, 1, 0.22, 1), border-color 0.35s ease;
      border: 1.5px solid #E6E5DC;
      background: #FFFFFF;
      color: #1E3A34;
      font-weight: 500;
      border-radius: 9999px;
    }

    .voldog-btn-secondary::after {
      content: '';
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 0;
      background-color: #1E3A34;
      z-index: 0;
      transition: height 0.35s cubic-bezier(0.19, 1, 0.22, 1);
    }

    .voldog-btn-secondary:hover {
      color: #F7F5EE !important;
      border-color: #1E3A34;
    }

    .voldog-btn-secondary:hover::after {
      height: 100%;
    }

    .voldog-btn-secondary>* {
      position: relative;
      z-index: 1;
    }

    /* ========== PULSE RING ========== */
    @keyframes pulseRing {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }
    }

    .pulse-ring-critical {
      animation: pulseRing 1s ease-in-out infinite;
    }

    /* ========== CONFETTI ========== */
    @keyframes confettiFall {
      0% {
        transform: translateY(0) rotate(0deg) scale(1);
        opacity: 1;
      }

      100% {
        transform: translateY(120px) rotate(720deg) scale(0);
        opacity: 0;
      }
    }

    .confetti-piece {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 2px;
      animation: confettiFall 1s ease-out forwards;
      pointer-events: none;
    }

    /* ========== SHIMMER ========== */
    @keyframes shimmer {
      0% {
        background-position: -200% 0;
      }

      100% {
        background-position: 200% 0;
      }
    }

    .shimmer {
      background: linear-gradient(90deg, #FFFFFF 25%, #EFECE3 50%, #FFFFFF 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s ease-in-out infinite;
      border-radius: 8px;
    }

    /* ========== CARD HOVER ========== */
    .task-card {
      position: relative;
      background: #FFFFFF;
      border: 1.5px solid #E6E5DC;
      border-radius: 20px;
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.4s ease, box-shadow 0.4s ease;
      overflow: hidden;
    }

    .task-card::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 0;
      height: 3px;
      background: linear-gradient(90deg, #1E3A34, #DDE235);
      transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1), left 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .task-card:hover {
      transform: translateY(-4px) scale(1.005) rotate(0.1deg);
      border-color: #1E3A34;
      box-shadow: 0 16px 36px rgba(30, 58, 52, 0.06);
    }

    .task-card:hover::before {
      width: 100%;
      left: 0;
    }

    /* ========== VOICE WAVEFORM ========== */
    @keyframes waveBar {

      0%,
      100% {
        height: 8px;
      }

      50% {
        height: 24px;
      }
    }

    .wave-bar {
      width: 3px;
      background: #1E3A34;
      border-radius: 2px;
      animation: waveBar 0.6s ease-in-out infinite;
    }

    /* ========== TOAST ========== */
    @keyframes toastIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }

      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    @keyframes toastOut {
      from {
        transform: translateX(0);
        opacity: 1;
      }

      to {
        transform: translateX(100%);
        opacity: 0;
      }
    }

    .toast-enter {
      animation: toastIn 300ms ease forwards;
    }

    .toast-exit {
      animation: toastOut 300ms ease forwards;
    }

    /* ========== ALERT BANNERS ========== */
    @keyframes criticalPulse {

      0%,
      100% {
        border-color: #E05A47;
      }

      50% {
        border-color: #FFA590;
        box-shadow: 0 0 20px rgba(224, 90, 71, 0.2);
      }
    }

    .alert-critical {
      animation: criticalPulse 1.5s ease-in-out infinite;
    }

    /* ========== SIDEBAR ========== */
    .sidebar-collapsed {
      width: 64px;
    }

    .sidebar-expanded {
      width: 240px;
    }

    .sidebar-transition {
      transition: width 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ========== KANBAN ========== */
    .kanban-drop-active {
      background: rgba(30, 58, 52, 0.03);
      border: 2.5px dashed #1E3A34;
    }

    /* ========== REDUCED MOTION ========== */
    @media (prefers-reduced-motion: reduce) {

      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ========== MOBILE ========== */
    @media (max-width: 375px) {
      .sidebar-desktop {
        display: none !important;
      }

      .mobile-tab-bar {
        display: flex !important;
      }
    }

    @media (min-width: 376px) {
      .mobile-tab-bar {
        display: none !important;
      }
    }

    /* ========== CHAT BUBBLES ========== */
    .chat-user {
      background: #1E3A34;
      color: #F7F5EE;
      border-radius: 18px 18px 4px 18px;
      font-weight: 500;
    }

    .chat-ai {
      background: #FFFFFF;
      border-radius: 18px 18px 18px 4px;
      border: 1.5px solid #E6E5DC;
      color: #1E3A34;
    }

    /* ========== HEATMAP ========== */
    .heatmap-cell {
      border-radius: 2px;
      transition: transform 150ms ease;
    }

    .heatmap-cell:hover {
      transform: scale(1.5);
    }

    /* ========== TEST OVERLAY ========== */
    .test-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(30, 58, 52, 0.98);
      color: #F7F5EE;
      z-index: 10000;
      overflow-y: auto;
      padding: 32px;
      font-family: 'JetBrains Mono', monospace;
    }

    /* ========== INPUT STYLES ========== */
    input,
    textarea,
    select {
      font-family: 'Manrope', sans-serif;
      background: #FFFFFF;
      border: 1.5px solid #E6E5DC;
      color: #1E3A34;
      transition: border-color 0.2s ease;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: #1E3A34;
      outline: none;
    }

    input::placeholder,
    textarea::placeholder {
      color: #6C8580;
    }

    /* ========== MASCOT & FOCUS ANIMATIONS ========== */
    @keyframes mascotBreathe {

      0%,
      100% {
        transform: translateY(0) scale(1);
      }

      50% {
        transform: translateY(-4px) scale(1.02);
      }
    }

    @keyframes mascotBlink {

      0%,
      90%,
      100% {
        transform: scaleY(1);
      }

      95% {
        transform: scaleY(0.1);
      }
    }

    @keyframes mascotTailWag {

      0%,
      100% {
        transform: rotate(0deg);
      }

      50% {
        transform: rotate(15deg);
      }
    }

    .voldog-mascot-body {
      animation: mascotBreathe 3s ease-in-out infinite;
      transform-origin: bottom center;
    }

    .voldog-mascot-eye {
      animation: mascotBlink 4s ease-in-out infinite;
      transform-origin: center;
    }

    .voldog-mascot-tail {
      animation: mascotTailWag 0.6s ease-in-out infinite;
      transform-origin: bottom left;
    }

    .focus-mode-glow {
      box-shadow: 0 24px 50px rgba(30, 58, 52, 0.08);
    }

    /* ========== PREMIUM 2.0 VISUAL SYSTEM ========== */
    :root {
      --ink: #090b0a;
      --panel: #141714;
      --lime: #dfff62;
      --ivory: #f4f2e9;
      --muted: #8e988f;
      --line: rgba(244, 242, 233, .105);
      --ease-out: cubic-bezier(.16, 1, .3, 1);
    }

    body {
      background: linear-gradient(-45deg, #090b0a, #0b0d1e, #1a0b1f, #071517, #09090b);
      background-size: 400% 400%;
      animation: gradientBG 22s ease infinite;
      letter-spacing: -.01em;
      position: relative;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      opacity: .17;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.28'/%3E%3C/svg%3E");
      mix-blend-mode: soft-light;
    }

    ::selection { color: #0b0d0b; background: var(--lime); }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #343b35; border-radius: 20px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--lime); }

    .app-shell {
      isolation: isolate;
      background:
        linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    /* ========== DYNAMIC BACKGROUND BLOBS ========== */
    .bg-glow-blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
      opacity: 0.12;
      mix-blend-mode: screen;
      transition: background 1.2s ease, transform 1.2s ease;
    }

    .bg-glow-blob--1 {
      width: 50vw;
      height: 50vw;
      top: -10vw;
      right: -10vw;
      background: radial-gradient(circle, var(--scene-accent, #dfff62) 0%, transparent 70%);
      animation: floatBlob1 25s ease-in-out infinite alternate;
    }

    .bg-glow-blob--2 {
      width: 45vw;
      height: 45vw;
      bottom: -15vw;
      left: -10vw;
      background: radial-gradient(circle, #858dff 0%, transparent 70%);
      animation: floatBlob2 30s ease-in-out infinite alternate;
    }

    .bg-glow-blob--3 {
      width: 35vw;
      height: 35vw;
      top: 30vh;
      left: 25vw;
      background: radial-gradient(circle, #dd82ff 0%, transparent 70%);
      animation: floatBlob3 20s ease-in-out infinite alternate;
    }

    @keyframes floatBlob1 {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-8%, 12%) scale(1.1); }
      100% { transform: translate(5%, -5%) scale(0.95); }
    }

    @keyframes floatBlob2 {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(12%, -8%) scale(0.9); }
      100% { transform: translate(-5%, 5%) scale(1.05); }
    }

    @keyframes floatBlob3 {
      0% { transform: translate(0, 0) scale(0.9); }
      50% { transform: translate(-10%, -10%) scale(1.1); }
      100% { transform: translate(8%, 8%) scale(1); }
    }

    .premium-sidebar {
      margin: 12px 0 12px 12px;
      height: calc(100% - 24px) !important;
      border: 1px solid var(--line) !important;
      border-radius: 22px;
      background: rgba(15, 18, 16, .78) !important;
      box-shadow: 0 24px 70px rgba(0, 0, 0, .34);
      backdrop-filter: blur(24px);
      overflow: hidden;
    }

    .premium-sidebar .sidebar-brand {
      height: 74px;
      border-color: var(--line);
    }

    .brand-mark {
      position: relative;
      background: var(--lime) !important;
      border-radius: 13px !important;
      box-shadow: 0 0 0 5px rgba(223, 255, 98, .07), 0 10px 30px rgba(223, 255, 98, .14);
      transform: rotate(-3deg);
      transition: transform .5s var(--ease-out);
    }

    .brand-mark::after {
      content: "";
      position: absolute;
      width: 7px;
      height: 7px;
      top: 6px;
      right: 6px;
      background: #0a0d0b;
      border-radius: 50%;
    }

    .sidebar-brand button:hover .brand-mark { transform: rotate(4deg) scale(1.06); }
    .premium-sidebar button { border: 1px solid transparent; }

    .premium-sidebar button[aria-current="page"] {
      background: linear-gradient(100deg, rgba(223,255,98,.14), rgba(223,255,98,.035)) !important;
      border-color: rgba(223,255,98,.16);
      box-shadow: inset 3px 0 var(--lime);
    }

    .premium-topbar {
      height: 72px !important;
      margin: 12px 16px 0;
      padding: 0 8px 0 18px !important;
      border: 1px solid var(--line) !important;
      border-radius: 18px;
      background: rgba(15, 18, 16, .68) !important;
      backdrop-filter: blur(22px);
      box-shadow: 0 20px 60px rgba(0,0,0,.18);
    }

    .search-shell {
      background: rgba(255, 255, 255, .035) !important;
      border-color: var(--line) !important;
      border-radius: 13px !important;
      transition: border-color .25s ease, background .25s ease, box-shadow .25s ease;
    }

    .search-shell:focus-within {
      border-color: rgba(223,255,98,.5) !important;
      background: rgba(223,255,98,.045) !important;
      box-shadow: 0 0 0 4px rgba(223,255,98,.06);
    }

    .workspace-main { padding: 28px 24px 24px !important; }

    .dashboard-hero {
      position: relative;
      margin-bottom: 26px !important;
      padding: 26px 28px;
      min-height: 154px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background:
        radial-gradient(circle at 88% 20%, rgba(223, 255, 98, .15), transparent 25%),
        linear-gradient(125deg, rgba(255,255,255,.055), rgba(255,255,255,.012));
      overflow: hidden;
      box-shadow: 0 24px 70px rgba(0,0,0,.2);
    }

    .dashboard-hero::after {
      content: "LM / 01";
      position: absolute;
      right: 24px;
      bottom: 16px;
      color: rgba(244,242,233,.2);
      font: 500 10px/1 'DM Mono', monospace;
      letter-spacing: .24em;
    }

    .dashboard-hero h1 {
      max-width: 650px;
      font-size: clamp(1.8rem, 3vw, 3.25rem) !important;
      line-height: .98;
      letter-spacing: -.06em;
    }

    .dashboard-hero p { margin-top: 14px; }

    .hero-kicker {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;

  <script type="module">
    // ===================================================================
    // CDN IMPORTS
    // ===================================================================
    import React, {
      useState, useEffect, useRef, useCallback, useMemo, memo, Fragment,
      createContext, useContext
    } from 'https://esm.sh/react@18.2.0';
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client?deps=react@18.2.0';
    import { create } from 'https://esm.sh/zustand@4.5.0?deps=react@18.2.0';

    const html = htm.bind(React.createElement);
    const e = React.createElement;

    // ===================================================================
    // CONSTANTS
    // ===================================================================
    const CRITICAL_THRESHOLD_MS = 60 * 60 * 1000;          // 1 hour
    const HIGH_THRESHOLD_MS = 4 * 60 * 60 * 1000;          // 4 hours
    const MEDIUM_THRESHOLD_MS = 24 * 60 * 60 * 1000;       // 24 hours
    const AI_DEBOUNCE_MS = 2000;
    const ALERT_CHECK_INTERVAL_MS = 60 * 1000;             // 1 minute
    const RATE_LIMIT_WINDOW_MS = 60 * 1000;                // 60 seconds
    const RATE_LIMIT_MAX_CALLS = 10;
    const MAX_INPUT_LENGTH = 500;
    const MAX_TITLE_LENGTH = 200;
    const MIN_TITLE_LENGTH = 1;
    const MAX_ESTIMATED_MINUTES = 480;
    const MIN_ESTIMATED_MINUTES = 1;

    const CONFETTI_COLORS = ['#1E3A34', '#DDE235', '#E05A47', '#E2943B', '#F2C94C', '#6C8580'];
    const PRIORITY_COLORS = { critical: '#E05A47', high: '#E2943B', medium: '#F2C94C', low: '#6C8580' };
    const STATUS_LIST = ['pending', 'in_progress', 'completed', 'overdue', 'snoozed'];
    const PRIORITY_LIST = ['critical', 'high', 'medium', 'low'];
    const RECURRENCE_LIST = ['none', 'daily', 'weekly', 'monthly'];
    const VIEW_NAMES = ['dashboard', 'board', 'planner', 'calendar', 'analytics'];
    const VIEW_LABELS = { dashboard: 'Dashboard', board: 'Task Board', planner: 'AI Planner', calendar: 'Calendar', analytics: 'Analytics' };
    const VIEW_ICONS = {
      dashboard: '⚡', board: '📋', planner: '🤖', calendar: '📅', analytics: '📊'
    };

    // ===================================================================
    // LOGGER (no-op in production, silent)
    // ===================================================================
    const Logger = {
      _enabled: false,
      debug() { },
      info() { },
      warn() { },
      error() { },
    };

    // ===================================================================
    // SANITIZATION
    // ===================================================================
    function sanitizeForPrompt(input) {
      if (typeof input !== 'string') return '';
      let s = input;
      s = s.replace(/[<>]/g, '');
      s = s.replace(/\n{3,}/g, '\n\n');
      s = s.replace(/\r/g, '');
      if (s.length > MAX_INPUT_LENGTH) s = s.slice(0, MAX_INPUT_LENGTH);
      return s.trim();
    }

    // ===================================================================
    // RATE LIMITER (ring buffer)
    // ===================================================================
    const rateLimiter = {
      _timestamps: [],
      canCall() {
        const now = Date.now();
        this._timestamps = this._timestamps.filter(t => now - t < RATE_LIMIT_WINDOW_MS);
        return this._timestamps.length < RATE_LIMIT_MAX_CALLS;
      },
      record() {
        this._timestamps.push(Date.now());
      },
      reset() {
        this._timestamps = [];
      },
      getCount() {
        const now = Date.now();
        this._timestamps = this._timestamps.filter(t => now - t < RATE_LIMIT_WINDOW_MS);
        return this._timestamps.length;
      }
    };

    // ===================================================================
    // VALIDATION
    // ===================================================================
    function validateTitle(title) {
      if (typeof title !== 'string') return 'Title is required';
      const t = title.trim();
      if (t.length < MIN_TITLE_LENGTH) return 'Title is required';
      if (t.length > MAX_TITLE_LENGTH) return `Title must be under ${MAX_TITLE_LENGTH} characters`;
      return null;
    }

    function validateDeadline(deadline) {
      if (!deadline) return 'Deadline is required';
      const d = new Date(deadline);
      if (isNaN(d.getTime())) return 'Invalid date format';
      return null;
    }

    function validateEstimatedMinutes(mins) {
      const n = parseInt(mins, 10);
      if (isNaN(n)) return 'Estimated time is required';
      if (n < MIN_ESTIMATED_MINUTES) return `Minimum ${MIN_ESTIMATED_MINUTES} minute`;
      if (n > MAX_ESTIMATED_MINUTES) return `Maximum ${MAX_ESTIMATED_MINUTES} minutes (8 hours)`;
      return null;
    }

    function validateTask(task) {
      const errors = {};
      const te = validateTitle(task.title);
      if (te) errors.title = te;
      const de = validateDeadline(task.deadline);
      if (de) errors.deadline = de;
      const me = validateEstimatedMinutes(task.estimatedMinutes);
      if (me) errors.estimatedMinutes = me;
      return Object.keys(errors).length > 0 ? errors : null;
    }

    // ===================================================================
    // DEADLINE UTILITIES
    // ===================================================================
    function getDeadlineStatus(deadlineISO) {
      const now = Date.now();
      const deadline = new Date(deadlineISO).getTime();
      const remaining = deadline - now;
      if (remaining <= 0) return 'overdue';
      if (remaining <= CRITICAL_THRESHOLD_MS) return 'critical';
      if (remaining <= HIGH_THRESHOLD_MS) return 'high';
      if (remaining <= MEDIUM_THRESHOLD_MS) return 'medium';
      return 'safe';
    }

    function getTimeRemaining(deadlineISO) {
      const now = Date.now();
      const deadline = new Date(deadlineISO).getTime();
      const remaining = deadline - now;
      if (remaining <= 0) return 'Overdue';
      const mins = Math.floor(remaining / 60000);
      if (mins < 60) return `${mins}m left`;
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return `${hrs}h ${mins % 60}m left`;
      const days = Math.floor(hrs / 24);
      return `${days}d ${hrs % 24}h left`;
    }

    function getNextRecurrenceDate(task) {
      const base = task.completedAt ? new Date(task.completedAt) : new Date(task.deadline);
      const next = new Date(base);
      switch (task.recurrence) {
        case 'daily': next.setDate(next.getDate() + 1); break;
        case 'weekly': next.setDate(next.getDate() + 7); break;
        case 'monthly': next.setMonth(next.getMonth() + 1); break;
        default: return null;
      }
      return next.toISOString();
    }

    function formatDateTime(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    function formatDate(iso) {
      if (!iso) return '';
      return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function formatTime(iso) {
      if (!iso) return '';
      return new Date(iso).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
    }

    // ===================================================================
    // DEMO DATA
    // ===================================================================
    function createDemoTasks() {

          deadline: new Date(now + 3 * 86400000).toISOString(), estimatedMinutes: 60, priority: 'low',

    function createDefaultProfile() {
      return {
        name: 'User',
        workingHours: { start: '09:00', end: '17:00' },
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
        productivityPeak: 'morning',
        streakDays: 1,
        totalCompleted: 1,
        missedDeadlines: 0,
      };
    }

    // ===================================================================
    // STORAGE HELPERS
    // ===================================================================
    function loadFromStorage(key, fallback) {
      try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : fallback;
      } catch { return fallback; }
    }

    function saveToStorage(key, data) {
      try { localStorage.setItem(key, JSON.stringify(data)); } catch { }
    }

    // ===================================================================
    // AI RESPONSE PARSER
    // ===================================================================
    function parseAIResponse(raw) {
      if (!raw || typeof raw !== 'string') return null;
      let cleaned = raw.trim();
      // Strip markdown code fences
      cleaned = cleaned.replace(/^```(?:json)?\s*/i, '').replace(/\s*```$/i, '');
      cleaned = cleaned.trim();
      try {
        return JSON.parse(cleaned);
      } catch {
        // Try to extract JSON from the response
        const match = cleaned.match(/\{[\s\S]*\}/);
        if (match) {
          try { return JSON.parse(match[0]); } catch { return null; }
        }
        return null;
      }
    }

    function parseActionTags(text) {
      const actions = [];
      const actionRegex = /<action>([\s\S]*?)<\/action>/g;
      let match;
      while ((match = actionRegex.exec(text)) !== null) {
        try {
          actions.push(JSON.parse(match[1]));
        } catch { }
      }
      const displayText = text.replace(/<action>[\s\S]*?<\/action>/g, '').trim();
      return { actions, displayText };
    }

    // ===================================================================
    // ZUSTAND STORE
    // ===================================================================
    const useStore = create((set, get) => ({
      // -- State --
      tasks: loadFromStorage(STORAGE_KEY_TASKS, null) || createDemoTasks(),
      profile: loadFromStorage(STORAGE_KEY_PROFILE, null) || createDefaultProfile(),
      insights: loadFromStorage(STORAGE_KEY_INSIGHTS, []),
      schedule: loadFromStorage(STORAGE_KEY_SCHEDULE, []),
      chatHistory: loadFromStorage(STORAGE_KEY_CHAT, []),
      currentView: 'dashboard',
      previousView: null,
      sidebarExpanded: window.innerWidth > 768,
      settingsOpen: false,
      apiKey: localStorage.getItem(STORAGE_KEY_API_KEY) || '',
      groqApiKey: localStorage.getItem(STORAGE_KEY_GROQ_API_KEY) || '',
      aiProvider: (localStorage.getItem(STORAGE_KEY_AI_PROVIDER) === 'anthropic' && localStorage.getItem(STORAGE_KEY_API_KEY)) ? 'anthropic' : 'groq',
      toasts: [],
      alerts: [],
      aiLoading: false,
      searchQuery: '',
      onboarded: loadFromStorage(STORAGE_KEY_ONBOARDED, false),
      voiceEnabled: true,
      calendarView: 'week',
      focusMode: false,

      setFocusMode(val) { set({ focusMode: val }); },

      // -- Persistence --
      _persist() {
        const s = get();
        saveToStorage(STORAGE_KEY_TASKS, s.tasks);
        saveToStorage(STORAGE_KEY_PROFILE, s.profile);
        saveToStorage(STORAGE_KEY_INSIGHTS, s.insights);
        saveToStorage(STORAGE_KEY_SCHEDULE, s.schedule);
        saveToStorage(STORAGE_KEY_CHAT, s.chatHistory);
        saveToStorage(STORAGE_KEY_ONBOARDED, s.onboarded);
        saveToStorage(STORAGE_KEY_AI_PROVIDER, s.aiProvider);
      },

      // -- Tasks --
      addTask(task) {
        const newTask = {
          id: nanoid(), title: '', description: '', deadline: '', estimatedMinutes: 30,
          priority: 'medium', status: 'pending', tags: [], recurrence: 'none', aiScore: 0,
          subtasks: [], createdAt: new Date().toISOString(), updatedAt: new Date().toISOString(),
          completedAt: null, snoozedUntil: null, notes: '', ...task,
          id: task.id || nanoid(),
        };
        set(s => ({ tasks: [...s.tasks, newTask] }));
        get()._persist();
        return newTask;
      },

      updateTask(id, updates) {
        set(s => ({
          tasks: s.tasks.map(t => t.id === id ? { ...t, ...updates, updatedAt: new Date().toISOString() } : t)
        }));
        get()._persist();
      },

      deleteTask(id) {
        set(s => ({ tasks: s.tasks.filter(t => t.id !== id) }));
        get()._persist();
      },

      completeTask(id) {
        const task = get().tasks.find(t => t.id === id);
        if (!task) return;
        const now = new Date().toISOString();
        set(s => ({
          tasks: s.tasks.map(t => t.id === id ? { ...t, status: 'completed', completedAt: now, updatedAt: now } : t),
          profile: { ...s.profile, totalCompleted: s.profile.totalCompleted + 1 }
        }));
        // Handle recurrence
        if (task.recurrence !== 'none') {
          const nextDeadline = getNextRecurrenceDate({ ...task, completedAt: now });
          if (nextDeadline) {
            get().addTask({
              ...task, id: nanoid(), status: 'pending', completedAt: null,
              deadline: nextDeadline, createdAt: now, updatedAt: now
            });
          }
        }
        get()._persist();
      },

      toggleSubtask(taskId, subtaskId) {
        set(s => ({
          tasks: s.tasks.map(t => t.id === taskId ? {
            ...t,
            subtasks: t.subtasks.map(st => st.id === subtaskId ? { ...st, completed: !st.completed } : st),

          } : t)

    let aiDebounceTimer = null;

    async function callClaudeAPI(messages, systemPrompt) {
      const apiKey = useStore.getState().apiKey;
      if (!apiKey) {
        useStore.getState().showToast('Please set your API key in Settings', 'warning');
        return null;
      }
      if (!rateLimiter.canCall()) {
        useStore.getState().showToast('Rate limit reached. Please wait a moment.', 'warning');
        return null;
      }
      rateLimiter.record();

      try {
        const response = await fetch(CLAUDE_API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': apiKey,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true',
          },
          body: JSON.stringify({
            model: CLAUDE_MODEL,
            max_tokens: 2048,
            system: systemPrompt,
            messages,
          }),
        });

        if (!response.ok) {
          const err = await response.text();
          throw new Error(`API error ${response.status}: ${err.slice(0, 200)}`);
        }

        const data = await response.json();
        return data.content?.[0]?.text || null;
      } catch (err) {
        useStore.getState().showToast('AI request failed. Check your API key.', 'error');
        return null;
      }
    }

    async function callGroqAPI(messages, systemPrompt, isJson = false) {
      const apiKey = useStore.getState().groqApiKey;
      if (!apiKey) {
        useStore.getState().showToast('Please set your Groq API key in Settings', 'warning');
        return null;
      }
      if (!rateLimiter.canCall()) {
        useStore.getState().showToast('Rate limit reached. Please wait a moment.', 'warning');
        return null;
      }
      rateLimiter.record();

      try {
        const fullMessages = [
          { role: 'system', content: systemPrompt },
          ...messages
        ];

        const bodyData = {
          model: GROQ_MODEL,
          max_tokens: 2048,
          messages: fullMessages,
          temperature: 0.1
        };

        if (isJson) {
          bodyData.response_format = { type: 'json_object' };
        }

        const response = await fetch(GROQ_API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${apiKey}`,
          },
          body: JSON.stringify(bodyData),
        });

        if (!response.ok) {
          const err = await response.text();
          throw new Error(`API error ${response.status}: ${err.slice(0, 200)}`);
        }

        const data = await response.json();
        return data.choices?.[0]?.message?.content || null;
      } catch (err) {
        useStore.getState().showToast('Groq AI request failed. Check your API key.', 'error');
        return null;
      }
    }

    async function callAIService(messages, systemPrompt, isJson = false) {
      const { aiProvider } = useStore.getState();
      if (aiProvider === 'groq') {
        return await callGroqAPI(messages, systemPrompt, isJson);
      } else {
        return await callClaudeAPI(messages, systemPrompt);

    function buildPrioritizationPrompt() {
      const { tasks, profile } = useStore.getState();
      const activeTasks = tasks.filter(t => t.status !== 'completed');
      const tasksJson = JSON.stringify(activeTasks.map(t => ({
        id: t.id, title: sanitizeForPrompt(t.title), deadline: t.deadline,
        estimatedMinutes: t.estimatedMinutes, priority: t.priority,
        status: t.status, tags: t.tags, recurrence: t.recurrence
      })));
      const profileJson = JSON.stringify({
        workingHours: profile.workingHours,
        productivityPeak: profile.productivityPeak,
        timezone: profile.timezone
      });

      return `You are a productivity AI for LastMinute. Return ONLY valid JSON, no prose, no markdown fences.

Prioritize tasks using: (0.4 × deadline_urgency) + (0.3 × user_impact) + (0.2 × effort_fit) + (0.1 × recency).
Flag any task where time_remaining_minutes < estimatedMinutes × 1.5.

User profile: ${profileJson}
Current time (ISO): ${new Date().toISOString()}
Tasks: ${tasksJson}

Return exactly:
{
  "rankedTaskIds": ["id1","id2"],
  "scores": {"id1": 92, "id2": 45},
  "urgencyFlags": {"id1": true},
  "insights": [
    {"type": "risk_alert", "message": "...", "actionLabel": "Start Now", "actionPayload": {"taskId": "id1", "action": "start"}}
  ],
  "recommendedSchedule": [
    {"taskId": "id1", "startTime": "2025-06-26T09:00:00Z", "endTime": "2025-06-26T11:00:00Z"}
  ]
}`;
    }

    async function runAIPrioritization() {
      const state = useStore.getState();
      if (state.aiLoading) return;
      const hasKey = state.aiProvider === 'groq' ? !!state.groqApiKey : !!state.apiKey;
      if (!hasKey) return;
      const activeTasks = state.tasks.filter(t => t.status !== 'completed');
      if (activeTasks.length === 0) return;

      state.setAiLoading(true);
      try {
        const systemPrompt = buildPrioritizationPrompt();
        const result = await callAIService(
          [{ role: 'user', content: 'Analyze and prioritize my current tasks.' }],
          systemPrompt,
          true
        );
        if (!result) { state.setAiLoading(false); return; }

        const parsed = parseAIResponse(result);
        if (!parsed) {
          // Fallback: sort by deadline
          const sorted = [...activeTasks].sort((a, b) => new Date(a.deadline) - new Date(b.deadline));
          sorted.forEach((t, i) => state.updateTask(t.id, { aiScore: Math.max(0, 100 - i * 15) }));
          state.setAiLoading(false);
          return;
        }

        // Apply scores
        if (parsed.scores) {
          Object.entries(parsed.scores).forEach(([id, score]) => {
            if (state.tasks.find(t => t.id === id)) {
              state.updateTask(id, { aiScore: Math.min(100, Math.max(0, score)) });
            }
          });
        }

        // Apply insights
        if (Array.isArray(parsed.insights)) {
          const newInsights = parsed.insights.map(i => ({
            id: nanoid(), type: i.type || 'risk_alert', message: i.message || '',
            actionLabel: i.actionLabel || '', actionPayload: i.actionPayload || null,
            createdAt: new Date().toISOString(), dismissed: false
          }));
          state.setInsights(newInsights);
        }

        // Apply schedule
        if (Array.isArray(parsed.recommendedSchedule)) {
          state.setSchedule(parsed.recommendedSchedule);
        }
      } catch { }
      state.setAiLoading(false);
    }

    function debouncedAIPrioritization() {
      if (aiDebounceTimer) clearTimeout(aiDebounceTimer);
      aiDebounceTimer = setTimeout(runAIPrioritization, AI_DEBOUNCE_MS);
    }

    // ===================================================================
    // PROACTIVE ALERT CHECKER
    // ===================================================================
    function checkAlerts() {
      const { tasks, setAlerts, updateTask } = useStore.getState();
      const now = Date.now();
      const newAlerts = [];
      let stateChanged = false;

      tasks.forEach(task => {
        if (task.status === 'completed' || task.status === 'snoozed') return;
        const deadline = new Date(task.deadline).getTime();
        const remaining = deadline - now;

        // Auto-flip overdue
        if (remaining <= 0 && task.status !== 'overdue') {
          updateTask(task.id, { status: 'overdue' });
          stateChanged = true;
        }

        if (remaining > 0 && remaining <= CRITICAL_THRESHOLD_MS) {
          newAlerts.push({
            id: `alert-${task.id}`, taskId: task.id, level: 'critical',
            message: `"${task.title}" is due in ${getTimeRemaining(task.deadline)}!`,
            autoDismiss: false
          });
        } else if (remaining > 0 && remaining <= HIGH_THRESHOLD_MS) {
          newAlerts.push({
            id: `alert-${task.id}`, taskId: task.id, level: 'high',
            message: `"${task.title}" — ${getTimeRemaining(task.deadline)}`,
            autoDismiss: 30000
          });
        } else if (remaining > 0 && remaining <= MEDIUM_THRESHOLD_MS) {
          newAlerts.push({
            id: `alert-${task.id}`, taskId: task.id, level: 'medium',
            message: `"${task.title}" — ${getTimeRemaining(task.deadline)}`,
            autoDismiss: 10000
          });
        }
      });

      setAlerts(newAlerts);
      if (stateChanged) debouncedAIPrioritization();
    }

    const VoiceService = {
      recognition: null,
      synthesis: window.speechSynthesis || null,
      available: false,

      init() {
        try {
          const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
          if (SpeechRecognition) {
            this.recognition = new SpeechRecognition();
            this.recognition.continuous = false;
            this.recognition.interimResults = false;
            this.recognition.lang = 'en-US';
            this.available = true;
          }
        } catch { this.available = false; }
      },

      listen(onResult, onEnd) {
        if (!this.available || !this.recognition) {
          useStore.getState().showToast('Voice unavailable, please type', 'warning');
          return false;
        }
        this.recognition.onresult = (event) => {
          const text = event.results[0][0].transcript;
          onResult(text);
        };
        this.recognition.onend = () => onEnd?.();
        this.recognition.onerror = () => onEnd?.();
        try {
          this.recognition.start();
          return true;
        } catch {
          onEnd?.();
          return false;
        }
      },

      stopListening() {
        try { this.recognition?.stop(); } catch { }
      },

      speak(text) {
        if (!this.synthesis || !useStore.getState().voiceEnabled) return;
        try {
          this.synthesis.cancel();
          const utterance = new SpeechSynthesisUtterance(text);
          utterance.rate = 1.0;
          utterance.pitch = 1.0;
          this.synthesis.speak(utterance);
        } catch { }
      }
    };

    VoiceService.init();

    // -- Urgency Pulse Ring --
    function UrgencyRing({ deadline, size = 40 }) {
      const status = getDeadlineStatus(deadline);
      const now = Date.now();
      const dl = new Date(deadline).getTime();
      const total = dl - (dl - 86400000 * 7);
      const remaining = Math.max(0, dl - now);
      const progress = Math.min(1, remaining / (86400000 * 7));
      const radius = (size - 4) / 2;
      const circumference = 2 * Math.PI * radius;
      const offset = circumference * (1 - progress);

      const color = status === 'critical' || status === 'overdue' ? '#E05A47'
        : status === 'high' ? '#E2943B'
          : status === 'medium' ? '#F2C94C' : '#6C8580';

      const pulseClass = status === 'critical' ? 'pulse-ring-critical' : '';

      return html`<svg width=${size} height=${size} className=${pulseClass} aria-label="Deadline urgency indicator">
    <circle cx=${size / 2} cy=${size / 2} r=${radius} fill="none" stroke="#E6E5DC" strokeWidth="2.5" />
    <circle cx=${size / 2} cy=${size / 2} r=${radius} fill="none" stroke=${color} strokeWidth="3"
      strokeDasharray=${circumference} strokeDashoffset=${offset}
      strokeLinecap="round" transform=${`rotate(-90 ${size / 2} ${size / 2})`}
      style=${{ transition: 'stroke-dashoffset 500ms ease' }} />
  </svg>`;
    }

    // -- Task Form Modal --
    function TaskFormModal({ task, onClose, onSave }) {
      const isEdit = !!task;
      const [form, setForm] = useState({
        title: task?.title || '', description: task?.description || '',
        deadline: task?.deadline ? task.deadline.slice(0, 16) : '',
        estimatedMinutes: task?.estimatedMinutes || 30, priority: task?.priority || 'medium',
        tags: task?.tags?.join(', ') || '', recurrence: task?.recurrence || 'none',
        notes: task?.notes || '',
      });
      const [errors, setErrors] = useState({});

      const handleSubmit = () => {
        const deadlineISO = form.deadline ? new Date(form.deadline).toISOString() : '';
        const taskData = {
          title: form.title.trim(),
          description: form.description.trim(),
          deadline: deadlineISO,
          estimatedMinutes: parseInt(form.estimatedMinutes, 10),
          priority: form.priority,
          tags: form.tags.split(',').map(t => t.trim()).filter(Boolean),
          recurrence: form.recurrence,
          notes: form.notes.trim(),
        };
        const validationErrors = validateTask(taskData);
        if (validationErrors) {
          setErrors(validationErrors);
          return;
        }
        onSave(taskData);
        onClose();
      };

      const updateField = (field, value) => {
        setForm(f => ({ ...f, [field]: value }));
        setErrors(e => ({ ...e, [field]: undefined }));
      };

      return html`<div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm" onClick=${ev => { if (ev.target === ev.currentTarget) onClose(); }}>
    <div className="bg-lm-card border border-lm-border rounded-[24px] p-6 w-full max-w-lg mx-4 shadow-2xl max-h-[90vh] overflow-y-auto" role="dialog" aria-label=${isEdit ? 'Edit task' : 'Add task'}>
      <h2 className="font-heading text-xl font-bold mb-4">${isEdit ? 'Edit Task' : 'New Task'}</h2>

      <div className="space-y-3">
        <div>
          <input type="text" placeholder="Task title" value=${form.title}
            onChange=${ev => updateField('title', ev.target.value)}
            className="w-full bg-lm-card border border-lm-border rounded-xl px-3 py-2.5 text-sm focus:border-lm-primary outline-none"
            aria-label="Task title" />
          ${errors.title ? html`<p className="text-lm-critical text-xs mt-1 font-semibold">${errors.title}</p>` : null}
        </div>

        <textarea placeholder="Description (optional)" value=${form.description}
          onChange=${ev => updateField('description', ev.target.value)} rows="2"
          className="w-full bg-lm-card border border-lm-border rounded-xl px-3 py-2.5 text-sm focus:border-lm-primary outline-none resize-none"
          aria-label="Task description" />

        <div className="grid grid-cols-2 gap-3">
          <div>
            <label className="text-xs font-mono text-lm-muted block mb-1">Deadline</label>
            <input type="datetime-local" value=${form.deadline}
              onChange=${ev => updateField('deadline', ev.target.value)}
              className="w-full bg-lm-card border border-lm-border rounded-xl px-3 py-2 text-sm focus:border-lm-primary outline-none"
              aria-label="Deadline" />
            ${errors.deadline ? html`<p className="text-lm-critical text-xs mt-1 font-semibold">${errors.deadline}</p>` : null}
          </div>
          <div>
            <label className="text-xs font-mono text-lm-muted block mb-1">Est. Minutes</label>
            <input type="number" value=${form.estimatedMinutes} min="1" max="480"
              onChange=${ev => updateField('estimatedMinutes', ev.target.value)}
              className="w-full bg-lm-card border border-lm-border rounded-xl px-3 py-2 text-sm focus:border-lm-primary outline-none"
              aria-label="Estimated minutes" />
            ${errors.estimatedMinutes ? html`<p className="text-lm-critical text-xs mt-1 font-semibold">${errors.estimatedMinutes}</p>` : null}
          </div>
        </div>

        <div className="grid grid-cols-2 gap-3">
          <div>
            <label className="text-xs font-mono text-lm-muted block mb-1">Priority</label>
            <select value=${form.priority} onChange=${ev => updateField('priority', ev.target.value)}
              className="w-full bg-lm-card border border-lm-border rounded-xl px-3 py-2 text-sm focus:border-lm-primary outline-none" aria-label="Priority">
              ${PRIORITY_LIST.map(p => html`<option key=${p} value=${p}>${p.charAt(0).toUpperCase() + p.slice(1)}</option>`)}
            </select>
          </div>
          <div>
            <label className="text-xs font-mono text-lm-muted block mb-1">Recurrence</label>
            <select value=${form.recurrence} onChange=${ev => updateField('recurrence', ev.target.value)}
              className="w-full bg-lm-card border border-lm-border rounded-xl px-3 py-2 text-sm focus:border-lm-primary outline-none" aria-label="Recurrence">
              ${RECURRENCE_LIST.map(r => html`<option key=${r} value=${r}>${r.charAt(0).toUpperCase() + r.slice(1)}</option>`)}
            </select>
          </div>
        </div>

        <input type="text" placeholder="Tags (comma separated)" value=${form.tags}
          onChange=${ev => updateField('tags', ev.target.value)}
          className="w-full bg-lm-card border border-lm-border rounded-xl px-3 py-2 text-sm focus:border-lm-primary outline-none"
          aria-label="Tags" />

        <textarea placeholder="Notes" value=${form.notes}
          onChange=${ev => updateField('notes', ev.target.value)} rows="2"
          className="w-full bg-lm-card border border-lm-border rounded-xl px-3 py-2.5 text-sm focus:border-lm-primary outline-none resize-none"
          aria-label="Notes" />

      <div className="flex gap-3 mt-5">
        <button onClick=${onClose} className="flex-1 py-2 voldog-btn-secondary rounded-xl text-sm" aria-label="Cancel">

        <button onClick=${handleSubmit} className="flex-1 py-2 voldog-btn rounded-xl text-sm" aria-label=${isEdit ? 'Update task' : 'Create task'}>

    // -- Task Card --
    function TaskCard({ task, onEdit, compact = false }) {
      const { completeTask, deleteTask, updateTask, showToast, toggleSubtask } = useStore();
      const cardRef = useRef(null);
      const [showDelete, setShowDelete] = useState(false);
      const priorityColor = PRIORITY_COLORS[task.priority] || PRIORITY_COLORS.medium;

      const handleComplete = (ev) => {
        ev.stopPropagation();
        completeTask(task.id);
        showToast(`"${task.title}" completed! 🎉`, 'success');
        if (cardRef.current) spawnConfetti(cardRef.current);
        debouncedAIPrioritization();
      };

      const handleStart = (ev) => {
        ev.stopPropagation();
        updateTask(task.id, { status: 'in_progress' });
        showToast(`Started: "${task.title}"`, 'info');
        debouncedAIPrioritization();
      };

      const handleDelete = (ev) => {
        ev.stopPropagation();
        deleteTask(task.id);
        showToast('Task deleted', 'info');
      };

      // Drag support
      const handleDragStart = (ev) => {
        ev.dataTransfer.setData('text/plain', task.id);
        ev.dataTransfer.effectAllowed = 'move';
      };

      const statusBadge = task.status === 'completed' ? html`<span className="text-[10px] font-bold px-2 py-0.5 rounded-full bg-emerald-50 text-emerald-800 border border-emerald-200">Done</span>`
        : task.status === 'overdue' ? html`<span className="text-[10px] font-bold px-2 py-0.5 rounded-full bg-red-50 text-[#E05A47] border border-red-200">Overdue</span>`
          : task.status === 'in_progress' ? html`<span className="text-[10px] font-bold px-2 py-0.5 rounded-full bg-lm-primary/10 text-lm-primary border border-lm-primary/20">Active</span>`
            : null;

      if (compact) {
        return html`<div ref=${cardRef} className="task-card relative p-3 cursor-pointer" draggable="true" onDragStart=${handleDragStart}
      onClick=${() => onEdit?.(task)} role="article" aria-label=${`Task: ${task.title}`}>
      <div className="flex items-center gap-2">
        <div className="w-2 h-2 rounded-full flex-shrink-0" style=${{ background: priorityColor }} />
        <span className="text-sm font-semibold flex-1 truncate">${task.title}</span>
        ${task.status !== 'completed' ? html`<${UrgencyRing} deadline=${task.deadline} size=${28} />` : null}
      </div>
      <div className="flex items-center gap-2 mt-1.5 text-xs text-lm-muted">
        <span className="font-mono font-medium">${getTimeRemaining(task.deadline)}</span>
        ${statusBadge}
      </div>
    </div>`;
      }

      return html`<div ref=${cardRef} className="task-card relative p-4 cursor-pointer group"
    draggable="true" onDragStart=${handleDragStart}
    onClick=${() => onEdit?.(task)} role="article" aria-label=${`Task: ${task.title}`}>
    <div className="flex items-start gap-3">
      <${UrgencyRing} deadline=${task.deadline} size=${40} />
      <div className="flex-1 min-w-0">
        <div className="flex items-center gap-2 mb-1">
          <span className="w-2 h-2 rounded-full flex-shrink-0" style=${{ background: priorityColor }} />
          <h4 className="font-bold text-sm truncate">${task.title}</h4>
        </div>
        ${task.description ? html`<p className="text-xs text-lm-muted mb-2 line-clamp-2 leading-relaxed">${task.description}</p>` : null}
        <div className="flex items-center gap-3 text-xs text-lm-muted font-medium">
          <span className="font-mono font-semibold">${getTimeRemaining(task.deadline)}</span>
          <span>${task.estimatedMinutes}m est.</span>
          ${statusBadge}
        </div>

        ${task.subtasks.length > 0 ? html`<div className="mt-2.5 space-y-1">
          ${task.subtasks.map(st => html`<label key=${st.id} className="flex items-center gap-2 text-xs cursor-pointer select-none" onClick=${ev => ev.stopPropagation()}>
            <input type="checkbox" checked=${st.completed} onChange=${() => toggleSubtask(task.id, st.id)}
              className="w-3.5 h-3.5 rounded border border-lm-border accent-lm-primary" aria-label=${st.title} />
            <span className=${st.completed ? 'line-through text-lm-muted' : 'text-lm-text font-medium'}>${st.title}</span>
          </label>`)}
        </div>` : null}

        ${task.tags.length > 0 ? html`<div className="flex gap-1 mt-2.5 flex-wrap">
          ${task.tags.map(tag => html`<span key=${tag} className="text-[10px] font-bold px-2 py-0.5 rounded bg-lm-surface text-lm-muted">${tag}</span>`)}
        </div>` : null}
      </div>

      <div className="flex items-center gap-1 text-xs font-mono text-lm-primary font-bold">
        ${task.aiScore > 0 ? html`<span className="bg-lm-primary/15 px-1.5 py-0.5 rounded-lg">${task.aiScore} pts</span>` : null}
      </div>
    </div>

    <div className="flex gap-2 mt-3.5 opacity-0 group-hover:opacity-100 transition-opacity">
      ${task.status === 'pending' ? html`<button onClick=${handleStart}
        className="flex-1 py-1.5 text-xs font-bold rounded-lg bg-lm-primary/10 text-lm-primary hover:bg-lm-primary/20 transition-colors" aria-label="Start task">Start</button>` : null}
      ${task.status !== 'completed' ? html`<button onClick=${handleComplete}
        className="flex-1 py-1.5 text-xs font-bold rounded-lg bg-emerald-50 text-emerald-800 hover:bg-emerald-100 border border-emerald-100 transition-colors" aria-label="Complete task">Complete</button>` : null}
      <button onClick=${(ev) => { ev.stopPropagation(); setShowDelete(true); }}
        className="py-1.5 px-3 text-xs font-bold rounded-lg bg-red-50 text-[#E05A47] hover:bg-red-100 border border-red-100 transition-colors" aria-label="Delete task">
        ${showDelete ? html`<span onClick=${handleDelete}>Confirm?</span>` : '🗑'}
      </button>
    </div>
  </div>`;
    }

    // DASHBOARD VIEW
    // ===================================================================
    function DashboardView() {
      const { tasks, insights, profile, aiLoading, dismissInsight, showToast, updateTask, setView, searchQuery } = useStore();
      const [addModalOpen, setAddModalOpen] = useState(false);
      const [editTask, setEditTask] = useState(null);

      const activeTasks = useMemo(() =>
        tasks.filter(t => t.status !== 'completed')
          .filter(t => !searchQuery.trim() || `${t.title} ${t.description || ''} ${(t.tags || []).join(' ')}`.toLowerCase().includes(searchQuery.trim().toLowerCase()))
          .sort((a, b) => (b.aiScore || 0) - (a.aiScore || 0)),
        [tasks, searchQuery]
      );
      const urgentTasks = useMemo(() => activeTasks.filter(t => {
        const s = getDeadlineStatus(t.deadline);
        return s === 'critical' || s === 'high';
      }), [activeTasks]);
      const todayCompleted = useMemo(() => {
        const today = new Date().toDateString();
        return tasks.filter(t => t.completedAt && new Date(t.completedAt).toDateString() === today).length;
      }, [tasks]);

      const activeInsights = useMemo(() => insights.filter(i => !i.dismissed), [insights]);

      const handleInsightAction = (insight) => {
        if (!insight.actionPayload) return;
        const { taskId, action } = insight.actionPayload;
        if (action === 'start' && taskId) {
          updateTask(taskId, { status: 'in_progress' });
          showToast('Task started!', 'success');
        }
        dismissInsight(insight.id);
        debouncedAIPrioritization();
      };

      const handleAddTask = (taskData) => {
        useStore.getState().addTask(taskData);
        showToast('Task created!', 'success');
        debouncedAIPrioritization();
      };

      const handleEditSave = (taskData) => {
        if (editTask) {
          useStore.getState().updateTask(editTask.id, taskData);
          showToast('Task updated!', 'success');
          debouncedAIPrioritization();
        }
        setEditTask(null);
      };

      return html`<div className="dashboard-view view-enter flex gap-4 h-full">
    <div className="flex-1 min-w-0 overflow-y-auto pr-2">

      <div className="dashboard-hero flex items-center justify-between mb-6">
        <div>
          <div className="hero-kicker">Live command center</div>
          <h1 className="font-heading text-2xl font-bold">Good ${new Date().getHours() < 12 ? 'morning' : new Date().getHours() < 17 ? 'afternoon' : 'evening'}, ${profile.name}</h1>
          <p className="text-lm-muted text-sm mt-1">You have ${urgentTasks.length} urgent task${urgentTasks.length !== 1 ? 's' : ''} today</p>
        </div>
        <button onClick=${() => setAddModalOpen(true)}
          className="voldog-btn flex items-center gap-2 px-4 py-2 rounded-xl text-sm"
          aria-label="Quick add task">
          <span>+ New Task</span>
        </button>
      </div>


      <div className="stat-grid grid grid-cols-3 gap-3 mb-6">
        <div className="stat-card bg-lm-card border border-lm-border rounded-xl p-4">
          <p className="text-lm-muted text-xs uppercase tracking-wide">Today's Progress</p>
          <p className="text-2xl font-heading font-bold mt-1">${todayCompleted}</p>
          <p className="text-xs text-lm-muted">tasks completed</p>
        </div>
        <div className="stat-card bg-lm-card border border-lm-border rounded-xl p-4">
          <p className="text-lm-muted text-xs uppercase tracking-wide">Streak</p>
          <p className="text-2xl font-heading font-bold mt-1">🔥 ${profile.streakDays}</p>
          <p className="text-xs text-lm-muted">day${profile.streakDays !== 1 ? 's' : ''}</p>
        </div>
        <div className="stat-card bg-lm-card border border-lm-border rounded-xl p-4">
          <p className="text-lm-muted text-xs uppercase tracking-wide">Active</p>
          <p className="text-2xl font-heading font-bold mt-1">${activeTasks.length}</p>
          <p className="text-xs text-lm-muted">tasks remaining</p>
        </div>
      </div>

      <${AlertBanners} />


      ${urgentTasks.length > 0 ? html`<div className="mb-6">
        <h2 className="font-heading text-lg font-bold mb-3 flex items-center gap-2">
          <span className="text-lm-critical">⚡</span> Urgent Tasks
        </h2>
        <div className="space-y-3">
          ${urgentTasks.map(t => html`<${TaskCard} key=${t.id} task=${t} onEdit=${setEditTask} />`)}
        </div>
      </div>` : null}


      <div>
        <h2 className="font-heading text-lg font-bold mb-3">All Tasks</h2>
        <div className="space-y-3">
          ${activeTasks.length > 0 ? activeTasks.map(t => html`<${TaskCard} key=${t.id} task=${t} onEdit=${setEditTask} />`)
          : html`<div className="text-center py-12 text-lm-muted">
              <p className="text-4xl mb-3">🎉</p>
              <p className="text-sm font-medium">All caught up! Add a new task to get started.</p>
            </div>`}
        </div>
      </div>
    </div>


    <div className="insights-panel w-80 flex-shrink-0 hidden lg:block overflow-y-auto">
      <h2 className="font-heading text-lg font-bold mb-3 flex items-center gap-2">
        <span>🤖</span> AI Insights
      </h2>
      ${aiLoading ? html`<${ShimmerLoader} />` : null}
      ${activeInsights.length > 0 ? html`<div className="space-y-3">
        ${activeInsights.map(insight => html`<div key=${insight.id} className="bg-lm-card border border-lm-border rounded-xl p-4">
          <div className="flex items-start gap-2">
            <span className="text-sm flex-shrink-0">${insight.type === 'risk_alert' ? '🔴' :
              insight.type === 'schedule_suggestion' ? '📅' :
                insight.type === 'break_reminder' ? '☕' :
                  insight.type === 'habit_tip' ? '💡' : '📋'
            }</span>
            <div className="flex-1">
              <p className="text-sm font-medium leading-relaxed">${insight.message}</p>
              ${insight.actionLabel ? html`<button onClick=${() => handleInsightAction(insight)}
                className="mt-2 text-xs font-bold px-3 py-1.5 rounded-lg bg-lm-primary/10 text-lm-primary hover:bg-lm-primary/20 border border-lm-primary/20 transition-colors"
                aria-label=${insight.actionLabel}>
                ${insight.actionLabel}
              </button>` : null}

      </div>`}

    ${addModalOpen ? html`<${TaskFormModal} onClose=${() => setAddModalOpen(false)} onSave=${handleAddTask} />` : null}
    ${editTask ? html`<${TaskFormModal} task=${editTask} onClose=${() => setEditTask(null)} onSave=${handleEditSave} />` : null}
  </div>`;
    }

    // ===================================================================
    // KANBAN BOARD VIEW
    // ===================================================================
    function TaskBoardView() {
      const { tasks, updateTask, showToast, searchQuery } = useStore();
      const [editTask, setEditTask] = useState(null);
      const [addModalOpen, setAddModalOpen] = useState(false);
      const [dragOverColumn, setDragOverColumn] = useState(null);

      const visibleTasks = useMemo(() => tasks.filter(t =>
        !searchQuery.trim() || `${t.title} ${t.description || ''} ${(t.tags || []).join(' ')}`.toLowerCase().includes(searchQuery.trim().toLowerCase())
      ), [tasks, searchQuery]);

      const columns = useMemo(() => ({
        pending: { label: 'Pending', icon: '📋', tasks: visibleTasks.filter(t => t.status === 'pending' || t.status === 'overdue' || t.status === 'snoozed') },
        in_progress: { label: 'In Progress', icon: '🔄', tasks: visibleTasks.filter(t => t.status === 'in_progress') },
        completed: { label: 'Done', icon: '✅', tasks: visibleTasks.filter(t => t.status === 'completed') },
      }), [visibleTasks]);

      const handleDrop = (status) => (ev) => {
        ev.preventDefault();
        const taskId = ev.dataTransfer.getData('text/plain');
        if (!taskId) return;
        if (status === 'completed') {
          useStore.getState().completeTask(taskId);
          showToast('Task completed! 🎉', 'success');
        } else {
          updateTask(taskId, { status });
          showToast(`Moved to ${status.replace('_', ' ')}`, 'info');
        }
        setDragOverColumn(null);
        debouncedAIPrioritization();
      };

      const handleDragOver = (status) => (ev) => { ev.preventDefault(); setDragOverColumn(status); };
      const handleDragLeave = () => setDragOverColumn(null);

      const handleAddTask = (taskData) => {
        useStore.getState().addTask(taskData);
        showToast('Task created!', 'success');
        debouncedAIPrioritization();
      };

      const handleEditSave = (taskData) => {
        if (editTask) {
          updateTask(editTask.id, taskData);
          showToast('Task updated!', 'success');
          debouncedAIPrioritization();
        }
        setEditTask(null);
      };

      return html`<div className="kanban-view view-enter h-full flex flex-col">
    <div className="flex items-center justify-between mb-4">
      <h1 className="font-heading text-2xl font-bold">Task Board</h1>
      <button onClick=${() => setAddModalOpen(true)}
        className="voldog-btn flex items-center gap-2 px-4 py-2 rounded-xl text-sm"
        aria-label="Add task">
        <span>+ New Task</span>
      </button>
    </div>

    <div className="grid grid-cols-1 md:grid-cols-3 gap-4 flex-1 min-h-0">
      ${Object.entries(columns).map(([status, col]) => html`<div key=${status}
        className=${`flex flex-col bg-lm-surface rounded-xl border border-lm-border overflow-hidden ${dragOverColumn === status ? 'kanban-drop-active' : ''}`}
        onDrop=${handleDrop(status)} onDragOver=${handleDragOver(status)} onDragLeave=${handleDragLeave}>
        <div className="flex items-center justify-between px-4 py-3 border-b border-lm-border">
          <div className="flex items-center gap-2">
            <span>${col.icon}</span>
            <h3 className="font-heading font-semibold text-sm">${col.label}</h3>
          </div>
          <span className="text-xs text-lm-muted bg-lm-bg px-2 py-0.5 rounded-full">${col.tasks.length}</span>
        </div>
        <div className="flex-1 p-3 overflow-y-auto space-y-2">
          ${col.tasks.map(t => html`<${TaskCard} key=${t.id} task=${t} compact=${true} onEdit=${setEditTask} />`)}
          ${col.tasks.length === 0 ? html`<div className="text-center py-8 text-lm-muted text-xs">
            Drop tasks here
          </div>` : null}
        </div>
      </div>`)}
    </div>

    ${addModalOpen ? html`<${TaskFormModal} onClose=${() => setAddModalOpen(false)} onSave=${handleAddTask} />` : null}
    ${editTask ? html`<${TaskFormModal} task=${editTask} onClose=${() => setEditTask(null)} onSave=${handleEditSave} />` : null}
  </div>`;
    }
